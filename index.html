        <div class="text-sm text-slate-500 dark:text-slate-400 mt-1">${note}</div></div></main>`;
  },

  /* ---- screens ---- */
  screens: {
    login()  { return Auth.screen(); },
    home()   {
      const u = App.user || {};
      const initials = (u.name || "?").split(" ").map(s => s[0]).slice(0, 2).join("").toUpperCase();
      const avatar = u.photo
        ? `<img src="${u.photo}" alt="" class="w-11 h-11 shrink-0 rounded-full object-cover">`
        : `<div class="w-11 h-11 shrink-0 grid place-items-center rounded-full bg-brand text-white font-semibold text-sm">${initials}</div>`;
      return App.appBar("TanukiFamily · Аудит") + `<main class="max-w-3xl mx-auto px-4 py-6 space-y-6">
        <section class="flex items-center gap-3">
          ${avatar}
          <div class="flex-1 min-w-0">
            <div class="font-semibold leading-tight truncate">${Reports._esc(u.name || "")}</div>
            <div class="text-[13px] text-slate-500 dark:text-slate-400 truncate">${Reports._esc(u.position || App.userRoleNames(u))}</div>
          </div>
          <button data-action="logout" aria-label="Выйти" class="tnk-press inline-flex items-center gap-1.5 text-[13px] font-medium px-3 h-9 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800">${UI.icon("logout", "w-4 h-4")}<span>Выйти</span></button>
        </section>
        <section>
          <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Действия</h2>
          <div class="grid grid-cols-2 gap-3">
            ${App.can("analytics.view") ? App.tile("dashboard", "gauge", "Дашборд", "Статистика и задачи", true) : ""}
            ${(App.can("task.resolve") || App.can("task.assign") || App.can("analytics.view")) ? App.tile("tasks", "inbox", "Задачи", "Что и где устранить", true) : ""}
            ${App.tile("search", "search", "Поиск", "По всем разделам", true)}
            ${(App.isAdmin() || App.can("audit.viewScope")) ? App.tile("schedule", "calendar", "План проверок", "Охват и просрочки", true) : ""}
            ${App.can("audit.conduct") ? App.tile("new-audit", "clipboard", "Новый аудит", "По подразделению или всем", true) : ""}
            ${App.tile("history", "chart", "История", "Проверки и тренды", true)}
            ${App.can("checklist.edit") ? App.tile("open-constructor", "sliders", "Конструктор", "Чек-листы, веса, штрафы", true) : ""}
            ${App.isAdmin() ? App.tile("settings", "users", "Настройки", "Пользователи, роли, доступы") : ""}
            ${(!App.isAdmin() && App.can("users.createLogin")) ? App.tile("staff", "users", "Сотрудники", "Мои сотрудники и PIN", true) : ""}
          </div>
        </section></main>`;
    },
    audit_setup() {
      const s = App.setup;
      const resumable = s.resumable.length ? `<section class="mb-6">
        <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Незавершённые</h2>
        <div class="space-y-2">${s.resumable.map(a => `
          <button data-action="resume-audit" data-id="${a.id}" class="tnk-press w-full flex items-center gap-3 p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-left">
            <div class="w-9 h-9 grid place-items-center rounded-xl ${a.status === AUDIT_STATUS.PAUSED ? "bg-amber-500/10 text-amber-500" : "bg-brand/10 text-brand"}">${UI.icon(a.status === AUDIT_STATUS.PAUSED ? "pause" : "clipboard", "w-5 h-5")}</div>
            <div class="flex-1 min-w-0"><div class="font-medium text-sm truncate">${a.scope === "all" ? "Все подразделения" : App.deptName(a.deptIds[0])}</div>
              <div class="text-xs text-slate-500">${App.fmtDate(a.startedAt)} · ${a.status === AUDIT_STATUS.PAUSED ? "на паузе" : "в процессе"}</div></div>
            ${UI.icon("chevron", "w-4 h-4 text-slate-400")}</button>`).join("")}</div></section>` : "";
      const scopeCard = (val, icon, title, sub) => `<button data-action="set-scope" data-val="${val}" class="tnk-press flex-1 p-4 rounded-2xl border text-left ${s.scope === val ? "border-brand bg-brand/5" : "border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900"}">
        <div class="w-9 h-9 grid place-items-center rounded-xl ${s.scope === val ? "bg-brand text-white" : "bg-slate-100 dark:bg-slate-800 text-slate-500"} mb-2">${UI.icon(icon, "w-5 h-5")}</div>
        <div class="font-semibold text-sm">${title}</div><div class="text-xs text-slate-500">${sub}</div></button>`;
      const deptList = s.scope === "single"
        ? `<section class="mt-5"><h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Подразделение</h2>
          <div class="space-y-2">${s.departments.map(dep => {
            const has = dep._count > 0, sel = s.selDept === dep.id;
            return `<button ${has ? `data-action="sel-dept" data-dept="${dep.id}"` : "disabled"} class="tnk-press w-full flex items-center gap-3 p-4 rounded-2xl border text-left ${has ? (sel ? "border-brand bg-brand/5" : "border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900") : "opacity-50 border-slate-200 dark:border-slate-800"}">
              <div class="w-9 h-9 grid place-items-center rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500">${UI.icon("store", "w-5 h-5")}</div>
              <div class="flex-1"><div class="font-medium text-sm">${dep.name}</div><div class="text-xs text-slate-500">${has ? dep._count + " категорий" : "нет чек-листа"}</div></div>
              ${sel ? UI.icon("check", "w-5 h-5 text-brand") : ""}</button>`;
          }).join("")}</div></section>`
        : `<p class="mt-5 text-sm text-slate-500 dark:text-slate-400">Будут проверены все подразделения с чек-листом: <b>${s.departments.filter(d => d._count > 0).map(d => d.name).join(", ") || "—"}</b>.</p>`;
      const restBlock = (s.restaurants || []).length ? `<section class="mb-5">
        <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Ресторан</h2>
        <select data-field="setup-restaurant" class="w-full h-12 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm">
          ${s.restaurants.length > 1 ? `<option value="">— выберите ресторан —</option>` : ""}
          ${s.restaurants.map(r => `<option value="${r.id}" ${s.restaurantId === r.id ? "selected" : ""}>${Reports._esc(r.name)}</option>`).join("")}
        </select></section>` : "";
      return App.appBar("Новый аудит", { back: "home" }) + `<main class="max-w-3xl mx-auto px-4 py-6">
        ${resumable}${restBlock}
        <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Охват проверки</h2>
        <div class="flex gap-3">${scopeCard("single", "store", "Одно подразделение", "Бар, кухня, зал…")}${scopeCard("all", "layers", "Все подразделения", "Групповой отчёт")}</div>
        ${deptList}
        <button data-action="start-audit" class="tnk-press mt-6 w-full h-14 rounded-2xl bg-brand text-white font-semibold text-[15px] inline-flex items-center justify-center gap-2">${UI.icon("clipboard", "w-5 h-5")} Начать аудит</button>
      </main>`;
    },

    audit_run() {
      const a = Audit.active; if (!a) return App.screens.home();
      const deptId = Audit.ui.deptId;
      const cats = Audit.data.categories[deptId] || [];
      const chks = Audit.data.checkpoints[deptId] || [];
      const scores = Audit.recompute().scores;
      const tabs = a.deptIds.length > 1 ? `<div class="flex gap-2 overflow-x-auto pb-1 -mx-4 px-4">${a.deptIds.map(id => `
        <button data-action="switch-dept" data-dept="${id}" class="tnk-press shrink-0 px-4 h-9 rounded-full text-sm font-medium border ${id === deptId ? "bg-brand text-white border-brand" : "bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300"}">${App.deptName(id)} · ${Math.round(scores[id] ? scores[id].score : 100)}%</button>`).join("")}</div>` : "";
      const catBlocks = cats.map(cat => {
        const catChks = chks.filter(c => c.categoryId === cat.id);
        const catScore = scores[deptId] && scores[deptId].categories[cat.id] != null ? scores[deptId].categories[cat.id] : 100;
        const open = Audit.ui.openCat === cat.id;
        const rows = open ? catChks.map(cp => {
          const vios = Audit.violationsFor(cp.id);
          return `<div class="p-4 border-t border-slate-100 dark:border-slate-800">
            <div class="flex items-start gap-3">
              <div class="flex-1 min-w-0">
                <div class="text-[13px] text-slate-400">${cp.index} · ${cp.criterion}</div>
                <div class="font-medium text-sm">${cp.object}</div>
                <details class="mt-1"><summary class="text-xs text-brand cursor-pointer select-none">Требование стандарта</summary>
                  <p class="text-xs text-slate-500 dark:text-slate-400 mt-1 leading-relaxed">${cp.requirement || "—"}</p></details>
              </div>
              <button data-action="open-cp" data-dept="${deptId}" data-cp="${cp.id}" class="tnk-press shrink-0 inline-flex items-center gap-1 px-3 h-9 rounded-xl text-xs font-semibold ${vios.length ? "bg-brand text-white" : "bg-brand/10 text-brand"}">${UI.icon("alert", "w-4 h-4")}${vios.length || ""}</button>
            </div></div>`;
        }).join("") : "";
        return `<div class="rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 overflow-hidden">
          <button data-action="toggle-cat" data-cat="${cat.id}" class="w-full flex items-center gap-3 p-4 text-left">
            <div class="flex-1"><div class="font-semibold text-sm">${cat.name}</div><div class="text-xs text-slate-500">${catChks.length} пунктов · вес ${cat.weight}%</div></div>
            <span class="font-semibold text-sm ${App.scoreColor(catScore)}">${Math.round(catScore)}%</span>
            <span class="text-slate-400 transition-transform ${open ? "rotate-180" : ""}">${UI.icon("chevronDown", "w-5 h-5")}</span>
          </button>${rows}</div>`;
      }).join("");
      return App.appBar("Аудит") + `
        <div class="sticky top-14 z-10 bg-[#F7F8FA]/90 dark:bg-[#0B1120]/90 backdrop-blur border-b border-slate-200/70 dark:border-slate-800">
          <div class="max-w-3xl mx-auto px-4 py-3">
            <div class="flex items-end justify-between mb-2">
              <div><div class="text-xs text-slate-500">${a.restaurant ? Reports._esc(a.restaurant) + " · " : ""}${a.scope === "all" ? "Все подразделения" : App.deptName(deptId)}</div>
                <div class="text-3xl font-bold ${App.scoreColor(a.finalScore == null ? 100 : a.finalScore)}">${Math.round(a.finalScore == null ? 100 : a.finalScore)}%</div></div>
              <div class="text-right text-xs text-slate-500">Нарушений<div class="text-lg font-semibold text-slate-700 dark:text-slate-200">${Audit.data.violations.length}</div></div>
            </div>${tabs}
          </div></div>
        <main class="max-w-3xl mx-auto px-4 py-4 space-y-3 pb-28">${catBlocks}</main>
        <footer class="fixed bottom-0 inset-x-0 z-20 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-t border-slate-200 dark:border-slate-800" style="padding-bottom:env(safe-area-inset-bottom)">
          <div class="max-w-3xl mx-auto px-4 py-3 flex gap-2">
            <button data-action="audit-pause" class="tnk-press flex-1 h-12 rounded-xl border border-slate-200 dark:border-slate-700 font-medium text-sm inline-flex items-center justify-center gap-2 text-slate-600 dark:text-slate-300">${UI.icon("pause", "w-4 h-4")}Пауза</button>
            <button data-action="audit-abort" aria-label="Прекратить" class="tnk-press h-12 px-4 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-500 inline-flex items-center justify-center">${UI.icon("stop", "w-4 h-4")}</button>
            <button data-action="audit-finish" class="tnk-press flex-[1.4] h-12 rounded-xl bg-brand text-white font-semibold text-sm inline-flex items-center justify-center gap-2">${UI.icon("check", "w-4 h-4")}Завершить</button>
          </div></footer>`;
    },

    violation() {
      const d = VForm.draft; if (!d || !Audit.active) return App.screens.home();
      const cp = (Audit.data.checkpoints[d.deptId] || []).find(c => c.id === d.checkpointId) || {};
      const existing = Audit.violationsFor(d.checkpointId);
      const penaltyOpts = VForm.penalties.map(p => `<option value="${p.id}" ${p.id === d.penaltyId ? "selected" : ""}>${p.label} (−${p.percent}%)</option>`).join("");
      const roleOpts = `<option value="">— не назначен —</option>` + VForm.orgRoles.map(r => `<option value="${r.id}" ${r.id === d.assigneeRole ? "selected" : ""}>${r.title}</option>`).join("");
      const thumbs = d.photos.map((p, i) => `<div class="relative shrink-0">
        <button data-action="vform-edit-photo" data-idx="${i}" class="block w-20 h-20 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700"><img src="${p}" class="w-full h-full object-cover"></button>
        <button data-action="vform-remove-photo" data-idx="${i}" aria-label="Удалить фото" class="absolute -top-2 -right-2 w-6 h-6 grid place-items-center rounded-full bg-slate-900 text-white shadow">${UI.icon("x", "w-3.5 h-3.5")}</button>
        <span class="absolute bottom-1 right-1 w-5 h-5 grid place-items-center rounded-full bg-brand text-white">${UI.icon("pencil", "w-3 h-3")}</span></div>`).join("");
      const sevBtn = (val, label) => `<button data-action="vform-severity" data-val="${val}" class="tnk-press flex-1 h-11 rounded-xl text-sm font-medium border ${d.severity === val ? (val === SEVERITY.CRITICAL ? "bg-brand text-white border-brand" : "bg-slate-900 text-white border-slate-900 dark:bg-slate-100 dark:text-slate-900 dark:border-slate-100") : "bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300"}">${label}</button>`;
      const existingList = existing.length ? `<section class="mt-6"><h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Уже добавлено (${existing.length})</h3>
        <div class="space-y-2">${existing.map(v => `<div class="flex items-center gap-2 p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
          <span class="w-2 h-2 shrink-0 rounded-full ${v.severity === SEVERITY.CRITICAL ? "bg-brand" : "bg-slate-400"}"></span>
          <div class="flex-1 min-w-0 text-sm truncate">${v.comment || "Без комментария"} <span class="text-xs text-slate-400">−${v.penaltyPercent}%</span></div>
          <span class="text-xs text-slate-400">${App.fmtTime(v.createdAt)}</span>
          <button data-action="del-vio" data-id="${v.id}" aria-label="Удалить" class="text-slate-400">${UI.icon("trash", "w-4 h-4")}</button></div>`).join("")}</div></section>` : "";
      return App.appBar("Нарушение", { back: "audit_run" }) + `<main class="max-w-3xl mx-auto px-4 py-5 pb-28 space-y-5">
        <div class="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
          <div class="text-[13px] text-slate-400">${cp.index || ""} · ${cp.criterion || ""}</div>
          <div class="font-semibold">${cp.object || ""}</div>
          ${cp.requirement ? `<p class="text-xs text-slate-500 dark:text-slate-400 mt-1 leading-relaxed">${cp.requirement}</p>` : ""}
        </div>
        <div><label class="block text-sm font-medium mb-2">Тип нарушения</label><div class="flex gap-2">${sevBtn(SEVERITY.CRITICAL, "Критично")}${sevBtn(SEVERITY.NON_CRITICAL, "Некритично")}</div></div>
        ${d.severityMode === SEVMODE.FIXED
          ? `<div><label class="block text-sm font-medium mb-2">Штраф</label><div class="h-12 px-3 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm flex items-center text-slate-600 dark:text-slate-300">−${d.penaltyPercent}% · фиксированный${d.penaltyPercent >= 100 ? " (обнуляет категорию)" : ""}</div></div>`
          : d.severityMode === SEVMODE.MANAGER
          ? `<div class="p-3 rounded-xl bg-violet-50 dark:bg-violet-500/5 border border-violet-200 dark:border-violet-500/20 text-sm text-slate-600 dark:text-slate-300">${UI.icon("shield", "w-4 h-4 inline mr-1 -mt-0.5")}Оценку в процентах поставит руководитель. Вы фиксируете факт нарушения.</div>`
          : `<div><label class="block text-sm font-medium mb-2" for="pen">Штраф</label>
              <select id="pen" data-field="penalty" class="w-full h-12 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm">${penaltyOpts}</select></div>`}
        <div><label class="block text-sm font-medium mb-2" for="vComment">Комментарий</label>
          <div class="relative"><textarea id="vComment" data-field="comment" rows="3" class="w-full p-3 pr-12 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm resize-none" placeholder="Опишите нарушение…">${d.comment}</textarea>
            <button data-action="vform-voice" aria-label="Голосовой ввод" class="absolute top-2 right-2 w-9 h-9 grid place-items-center rounded-lg ${Voice.active ? "bg-brand text-white animate-pulse" : "bg-slate-100 dark:bg-slate-800 text-slate-500"}">${UI.icon("mic", "w-5 h-5")}</button></div>
          ${Voice.active ? '<div class="text-xs text-brand mt-1">Идёт запись… нажмите микрофон, чтобы остановить</div>' : ""}</div>
        <div><label class="block text-sm font-medium mb-2">Фото</label>
          <div class="flex gap-3 overflow-x-auto pb-1">${thumbs}
            <button data-action="vform-add-photo" aria-label="Добавить фото" class="tnk-press shrink-0 w-20 h-20 rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 grid place-items-center text-slate-400">${UI.icon("camera", "w-6 h-6")}</button></div>
          <input id="photoInput" type="file" accept="image/*" capture="environment" multiple class="hidden"></div>
        <div><label class="block text-sm font-medium mb-2" for="asg">Ответственный (Fix by…)</label>
          <select id="asg" data-field="assignee" class="w-full h-12 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm">${roleOpts}</select></div>
        <div><label class="block text-sm font-medium mb-2" for="vdl">Срок устранения</label>
          <input id="vdl" type="date" data-field="vdeadline" value="${d.deadline || ""}" class="w-full h-12 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm">
          <div class="text-xs text-slate-400 mt-1">Пусто = бессрочно (задача остаётся на контроле).</div></div>
        <div class="text-xs text-slate-400">Время фиксации: ${App.fmtTime(d.createdAt)}</div>
        ${existingList}
      </main>
      <footer class="fixed bottom-0 inset-x-0 z-20 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-t border-slate-200 dark:border-slate-800" style="padding-bottom:env(safe-area-inset-bottom)">
        <div class="max-w-3xl mx-auto px-4 py-3 flex gap-2">
          <button data-action="vform-save-add" class="tnk-press flex-1 h-12 rounded-xl border border-slate-200 dark:border-slate-700 font-medium text-sm text-slate-600 dark:text-slate-300">Сохранить и ещё</button>
          <button data-action="vform-save" class="tnk-press flex-[1.3] h-12 rounded-xl bg-brand text-white font-semibold text-sm">Сохранить</button>
        </div></footer>`;
    },

    photo_edit() {
      App._after = PhotoEdit.init;
      const toolBtn = (val, icon, label) => `<button data-action="pe-tool" data-val="${val}" class="tnk-press flex-1 h-11 rounded-xl text-sm font-medium border inline-flex items-center justify-center gap-1.5 ${PhotoEdit.tool === val ? "bg-brand text-white border-brand" : "bg-slate-800 border-slate-700 text-slate-200"}">${UI.icon(icon, "w-4 h-4")}${label}</button>`;
      return `<div class="min-h-dvh flex flex-col bg-slate-950">
        <header class="flex items-center justify-between px-4 h-14 text-white shrink-0">
          <button data-action="pe-cancel" aria-label="Отмена" class="w-10 h-10 grid place-items-center">${UI.icon("x", "w-6 h-6")}</button>
          <span class="text-sm font-medium">Разметка фото</span>
          <button data-action="pe-save" class="px-4 h-9 rounded-lg bg-brand text-white text-sm font-semibold">Готово</button>
        </header>
        <div class="flex-1 grid place-items-center p-4 overflow-hidden"><canvas id="editCanvas" class="max-w-full rounded-lg touch-none"></canvas></div>
        <div class="p-4 flex gap-2 shrink-0" style="padding-bottom:calc(1rem + env(safe-area-inset-bottom))">
          ${toolBtn("circle", "circle", "Круг")}${toolBtn("arrow", "arrow", "Стрелка")}
          <button data-action="pe-undo" aria-label="Отменить последнее" class="tnk-press h-11 px-4 rounded-xl border border-slate-700 text-slate-300 inline-flex items-center justify-center">${UI.icon("undo", "w-4 h-4")}</button>
        </div></div>`;
    },

    audit_done() {
      const a = Audit.active; if (!a) return App.screens.home();
      const crit = Audit.data.violations.filter(v => v.severity === SEVERITY.CRITICAL).length;
      const perDept = a.deptIds.map(id => { const sc = a.scores[id];
        return `<div class="flex items-center justify-between p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
          <span class="font-medium text-sm">${App.deptName(id)}</span>

          ${sec("Сотрудники", r.users, u => `<button data-action="adm-user-edit" data-id="${u.id}" class="tnk-press w-full flex items-center gap-2 p-3.5 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-left"><div class="flex-1 min-w-0"><div class="text-sm font-medium truncate">${Reports._esc(u.name)}</div><div class="text-xs text-slate-500 truncate">@${Reports._esc(u.login || "")} · ${Reports._esc(u.position || "")}</div></div>${UI.icon("chevron", "w-4 h-4 text-slate-400")}</button>`)}
          ${sec("Локации", r.places, n => `<div class="p-3.5 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm"><span class="text-[11px] px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400">${Geo.TYPES[n.type]}</span> ${Reports._esc(n.name)}</div>`)}
          ${sec("Подразделения", r.depts, dp => `<div class="p-3.5 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm">${Reports._esc(dp.name)}</div>`)}
        ` : '<div class="text-center text-sm text-slate-500 py-8">Ничего не найдено.</div>'}
      </main>`;
    },

    schedule() {
      if (!App.isAdmin() && !App.can("audit.viewScope")) return App.screens.home();
      const rests = App._geo.filter(n => n.type === "restaurant");
      const rows = rests.map(rst => { const s = App.schedOverdue(rst.id); const last = App._lastAudit[rst.id];
        return `<div class="flex items-center gap-2 p-3.5 rounded-2xl bg-white dark:bg-slate-900 border ${s && s.overdue ? "border-brand/40" : "border-slate-200 dark:border-slate-800"}">
          <div class="flex-1 min-w-0"><div class="text-sm font-medium truncate">${Reports._esc(rst.name)}</div>
            <div class="text-xs text-slate-500">${last ? "последний: " + new Date(last).toLocaleDateString("ru-RU") : "ещё не проверялся"}${s && s.overdue ? ' · <span class="text-brand font-medium">просрочено</span>' : (s ? ' · след. до ' + new Date(s.dueTs).toLocaleDateString("ru-RU") : "")}</div></div>
          <label class="text-xs text-slate-500 shrink-0">раз в <input type="number" min="0" data-field="sched-days" data-id="${rst.id}" value="${(App._schedules.find(x => x.restaurantId === rst.id) || {}).everyDays || ""}" placeholder="—" class="w-14 h-8 mx-1 px-2 rounded-lg bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm text-center"> дн.</label>
        </div>`; }).join("");
      return App.appBar("План проверок", { back: "home" }) + `<main class="max-w-3xl mx-auto px-4 py-6 space-y-3">
        <p class="text-[13px] text-slate-500 dark:text-slate-400">Задайте периодичность (в днях) для каждого ресторана. Просроченные подсвечиваются. Пусто = без плана.</p>
        ${rows || '<div class="text-center text-sm text-slate-500 py-8">Нет ресторанов. Добавьте в Настройки → География.</div>'}
      </main>`;
    },

    journal() {
      if (!App.isAdmin()) return App.screens.home();
      const list = (App._journal || []).slice(0, 200);
      return App.appBar("Журнал действий", { back: "settings" }) + `<main class="max-w-3xl mx-auto px-4 py-6 space-y-2">
        ${list.length ? list.map(l => `<div class="p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
          <div class="text-sm">${Reports._esc(l.action)}${l.detail ? ' <span class="text-slate-500">— ' + Reports._esc(l.detail) + "</span>" : ""}</div>
          <div class="text-xs text-slate-500 mt-0.5">${Reports._esc(l.actor)} · ${App.fmtDate(l.ts)}</div></div>`).join("") : '<div class="text-center text-sm text-slate-500 py-8">Записей нет.</div>'}
      </main>`;
    },

    vio_detail() {
      const ctx = Workflow.ctx; if (!ctx || !ctx.vio) return App.screens.audit_done();
      const v = ctx.vio, st = v.status || VIO_STATUS.OPEN, m = Workflow.meta(st);
      const audit = Audit.active || {};
      const cp = (Audit.data.checkpoints[v.deptId] || []).find(c => c.id === v.checkpointId) || {};
      const assignee = (App._orgRoles.find(r => r.id === v.assigneeRole) || {}).title;
      const photoStrip = (arr) => (arr && arr.length) ? `<div class="flex gap-2 flex-wrap mt-2">${arr.map(p => `<img src="${p}" class="w-24 h-24 object-cover rounded-lg border border-slate-200 dark:border-slate-700">`).join("")}</div>` : "";
      // Finding (from violation itself)
      const findingBlock = `<div class="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
        <div class="flex items-center gap-2 mb-1"><span class="w-2 h-2 rounded-full ${v.severity === SEVERITY.CRITICAL ? "bg-brand" : "bg-slate-400"}"></span>
          <span class="text-xs font-semibold text-slate-500">Замечание · ${audit.auditorName || ""} · ${App.fmtTime(v.createdAt)}</span></div>
        ${v.comment ? `<div class="text-sm">${Reports._esc(v.comment)}</div>` : '<div class="text-sm text-slate-400">Без комментария</div>'}
        ${photoStrip(v.photos)}</div>`;
      // Thread (fixes / disputes / decisions)
      const kindStyle = { fix: "border-l-4 border-amber-400", dispute: "border-l-4 border-violet-400", decision: "border-l-4 border-emerald-400" };
      const kindName = { fix: "Исправление", dispute: "Оспаривание", decision: "Решение" };
      const thread = (v.thread || []).filter(e => e.kind && e.kind !== "finding").map(e => `<div class="p-3.5 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 ${kindStyle[e.kind] || ""}">
        <div class="text-xs font-semibold text-slate-500 mb-1">${kindName[e.kind] || ""} · ${Reports._esc(e.name || "")}${e.role ? " (" + Reports._esc(e.role) + ")" : ""} · ${App.fmtTime(e.ts)}</div>
        ${e.text ? `<div class="text-sm">${Reports._esc(e.text)}</div>` : ""}${photoStrip(e.photos)}</div>`).join("");

      // Action availability
      const canFix = [VIO_STATUS.OPEN, VIO_STATUS.FIX_SUBMITTED, VIO_STATUS.DISPUTE_REJECTED].includes(st);
      const canResolve = Workflow.canResolve(audit) && st === VIO_STATUS.FIX_SUBMITTED;
      const canDispute = App.can("dispute.raise") && [VIO_STATUS.OPEN, VIO_STATUS.FIX_SUBMITTED].includes(st) && !v.dispute;
      const isApprover = st === VIO_STATUS.DISPUTED && Workflow.isApprover(audit) && !(v.dispute && (v.dispute.votes || []).some(x => x.userId === App.user.id));
      const composerPhotos = (ctx.composerPhotos || []);
      const composer = (canFix || canDispute) ? `<div class="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 space-y-3">
        <textarea id="wfText" data-field="wf-text" rows="2" placeholder="Комментарий…" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm resize-none">${Reports._esc(ctx.wfText || "")}</textarea>
        ${composerPhotos.length ? `<div class="flex gap-2 flex-wrap">${composerPhotos.map((p, i) => `<div class="relative"><img src="${p}" class="w-16 h-16 object-cover rounded-lg"><button data-action="wf-photo-del" data-idx="${i}" class="absolute -top-1.5 -right-1.5 w-5 h-5 grid place-items-center rounded-full bg-slate-900 text-white">${UI.icon("x", "w-3 h-3")}</button></div>`).join("")}</div>` : ""}
        <div class="flex gap-2">
          <button data-action="wf-add-photo" class="tnk-press h-11 px-3 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-500 inline-flex items-center gap-1.5 text-sm">${UI.icon("camera", "w-4 h-4")}Фото</button>
          ${canFix ? `<button data-action="wf-fix" class="tnk-press flex-1 h-11 rounded-xl bg-brand text-white font-semibold text-sm">Отправить исправление</button>` : ""}
        </div>
        ${canDispute ? `<button data-action="wf-dispute" class="tnk-press w-full h-11 rounded-xl border border-violet-300 text-violet-600 dark:text-violet-400 font-medium text-sm">Оспорить (текст выше = причина)</button>` : ""}
        <input id="wfPhotoInput" type="file" accept="image/*" capture="environment" multiple class="hidden">
      </div>` : "";
      const resolveBar = canResolve ? `<div class="flex gap-2">
        <button data-action="wf-reject" class="tnk-press flex-1 h-12 rounded-xl border border-slate-200 dark:border-slate-700 font-medium text-sm text-slate-600 dark:text-slate-300">Вернуть на доработку</button>
        <button data-action="wf-resolve" class="tnk-press flex-[1.3] h-12 rounded-xl bg-emerald-600 text-white font-semibold text-sm">Принять исправление</button></div>` : "";
      const votes = (v.dispute && v.dispute.votes) || [];
      const polSummary = Workflow.policySummary(audit);
      const votesLine = votes.length ? `<div class="text-xs text-slate-500">Голоса: ${votes.map(x => `${Reports._esc(x.name)} — ${x.approve ? "за" : "против"}`).join(", ")}</div>` : "";
      const disputeInfo = (st === VIO_STATUS.DISPUTED) ? `<div class="p-3 rounded-2xl bg-violet-50 dark:bg-violet-500/5 border border-violet-200 dark:border-violet-500/20 text-xs text-slate-600 dark:text-slate-300">
        <div class="font-medium mb-0.5">На согласовании</div>${polSummary ? `<div class="text-slate-500">Правило: ${Reports._esc(polSummary)}</div>` : '<div class="text-slate-500">Решает первый согласующий (политика не задана)</div>'}${votesLine}</div>` : "";
      const approveBar = isApprover ? `<div class="p-4 rounded-2xl bg-violet-50 dark:bg-violet-500/5 border border-violet-200 dark:border-violet-500/20 space-y-2">
        <div class="text-sm font-medium">Ваш голос по оспариванию</div>
        <div class="text-xs text-slate-500">${Reports._esc((v.dispute && v.dispute.reason) || "")}</div>
        <div class="flex gap-2 pt-1">
          <button data-action="wf-vote-reject" class="tnk-press flex-1 h-11 rounded-xl border border-slate-200 dark:border-slate-700 font-medium text-sm text-slate-600 dark:text-slate-300">Отклонить</button>
          <button data-action="wf-vote-approve" class="tnk-press flex-1 h-11 rounded-xl bg-violet-600 text-white font-semibold text-sm">Согласовать</button></div></div>` : "";
      const gateNote = (st === VIO_STATUS.FIX_SUBMITTED && App.can("task.resolve") && !canResolve)
        ? `<div class="text-xs text-slate-500 text-center">Принять может только сотрудник рангом не ниже проводившего аудит.</div>` : "";

      return App.appBar("Нарушение", { back: "audit_done" }) + `<main class="max-w-3xl mx-auto px-4 py-5 pb-28 space-y-4">
        <div class="flex items-center justify-between">
          <div class="text-sm text-slate-500">${cp.index || ""} · ${Reports._esc(cp.criterion || "")}</div>
          <span class="text-xs px-2.5 py-1 rounded-full ${m.cls}">${m.label}</span></div>
        <div class="text-lg font-semibold">${Reports._esc(cp.object || "")}</div>
        <div class="text-xs text-slate-500">${v.pendingScore ? '<span class="text-violet-600 dark:text-violet-400 font-medium">оценка не выставлена</span>' : "−" + v.penaltyPercent + "%"}${assignee ? " · ответственный: " + Reports._esc(assignee) : ""}${v.status === VIO_STATUS.DISPUTE_UPHELD ? " · балл восстановлен" : ""}</div>
        ${findingBlock}
        ${thread}
        ${App.can("score.override") ? `<button data-action="wf-set-score" class="tnk-press w-full h-11 rounded-xl border ${v.pendingScore ? "border-violet-400 text-violet-600 dark:text-violet-400" : "border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300"} font-medium text-sm">${v.pendingScore ? "Поставить оценку (%)" : "Изменить оценку (сейчас −" + v.penaltyPercent + "%)"}</button>` : ""}
        ${disputeInfo}${resolveBar}${gateNote}${approveBar}${composer}
      </main>`;
    },

    history() {
      const h = App.hist, f = App.histFilter, nf = App.histActiveFilters();
      const canDelete = App.can("audit.delete");
      const raw = App.histRaw.audits;
      // Filter option sources (derived from visible audit set)
      const auditors = [...new Map(raw.map(a => [a.auditorId, a.auditorName])).entries()].map(([id, name]) => ({ id, name }));
      const rests = [...new Map(raw.filter(a => a.restaurantId).map(a => [a.restaurantId, a.restaurant])).entries()].map(([id, name]) => ({ id, name }));
      const depts = [...new Set(raw.flatMap(a => a.deptIds || []))].map(id => ({ id, name: App.deptName(id) }));
      const opt = (val, cur, label) => `<option value="${val}" ${cur === val ? "selected" : ""}>${Reports._esc(label)}</option>`;
      const sel = (field, cur, ph, items) => `<select data-field="${field}" class="w-full h-11 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm">
        <option value="">${ph}</option>${items.map(it => opt(it.id, cur, it.name)).join("")}</select>`;
      const filterPanel = App.histFilterOpen ? `<div class="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 space-y-3">
        <div class="grid grid-cols-2 gap-2">
          <div><label class="block text-xs text-slate-500 mb-1">Период с</label><input type="date" data-field="hf-from" value="${f.from}" class="w-full h-11 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm"></div>
          <div><label class="block text-xs text-slate-500 mb-1">по</label><input type="date" data-field="hf-to" value="${f.to}" class="w-full h-11 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm"></div>
        </div>
        ${sel("hf-auditor", f.auditorId, "Проверяющий — любой", auditors)}
        ${rests.length ? sel("hf-restaurant", f.restaurantId, "Ресторан — любой", rests) : ""}
        ${sel("hf-dept", f.deptId, "Подразделение — любое", depts)}
        ${sel("hf-assignee", f.assignee, "Ответственный — любой", App._orgRoles.map(r => ({ id: r.id, name: r.title })))}
        <div class="flex gap-2 pt-1">
          <button data-action="hist-reset" class="tnk-press flex-1 h-10 rounded-xl border border-slate-200 dark:border-slate-700 text-sm font-medium text-slate-600 dark:text-slate-300">Сбросить</button>
          <button data-action="hist-export" class="tnk-press flex-[1.3] h-10 rounded-xl bg-brand text-white text-sm font-semibold inline-flex items-center justify-center gap-1.5">${UI.icon("download", "w-4 h-4")}Выгрузить за период</button>
        </div>
      </div>` : "";
      const filterBar = `<div class="flex items-center gap-2">
        <button data-action="hist-filter-toggle" class="tnk-press inline-flex items-center gap-1.5 h-9 px-3 rounded-xl border ${nf ? "border-brand text-brand bg-brand/5" : "border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300"} text-sm font-medium">${UI.icon("filter", "w-4 h-4")}Фильтры${nf ? ` · ${nf}` : ""}</button>
        ${nf ? `<button data-action="hist-reset" class="tnk-press text-sm text-slate-400">Сбросить</button>` : ""}
      </div>`;

      if (!raw.length) {
        return App.appBar("История", { back: "home" }) + `<main class="max-w-3xl mx-auto px-4 py-6">
          <div class="px-6 py-14 rounded-3xl border border-dashed border-slate-300 dark:border-slate-700 text-center">
            <div class="w-12 h-12 mx-auto grid place-items-center rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-400 mb-4">${UI.icon("chart", "w-6 h-6")}</div>
            <div class="font-semibold">Пока нет завершённых аудитов</div>
            <div class="text-sm text-slate-500 mt-1">Проведите первую проверку — здесь появятся тренды и статистика.</div></div></main>`;
      }

      App._after = History.drawChart;
      const kpi = `<div class="grid grid-cols-3 gap-2">
        <div class="p-3 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-center"><div class="text-2xl font-bold ${h.avg == null ? "text-slate-400" : App.scoreColor(h.avg)}">${h.avg == null ? "—" : h.avg + "%"}</div><div class="text-[11px] text-slate-500">средняя</div></div>
        <div class="p-3 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-center"><div class="text-2xl font-bold">${h.audits.length}</div><div class="text-[11px] text-slate-500">аудитов</div></div>
        <div class="p-3 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-center"><div class="text-2xl font-bold">${h.total}</div><div class="text-[11px] text-slate-500">нарушений</div></div>
      </div>`;
      const chart = h.trend.length >= 2
        ? `<div class="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
            <div class="text-sm font-semibold mb-3">Динамика итоговой оценки</div><div style="height:180px"><canvas id="trendChart"></canvas></div></div>`
        : "";
      const top = h.top.length ? `<div class="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
        <div class="text-sm font-semibold mb-3">Топ-5 частых нарушений</div>
        <div class="space-y-2">${h.top.map((t, i) => `<div class="flex items-center gap-3">
          <span class="w-6 h-6 shrink-0 grid place-items-center rounded-lg bg-brand/10 text-brand text-xs font-semibold">${i + 1}</span>
          <span class="flex-1 text-sm truncate">${Reports._esc(t.name)}</span><span class="text-sm font-semibold text-slate-500">${t.count}</span></div>`).join("")}</div></div>` : "";
      const rec = h.top.length ? `<div class="p-4 rounded-2xl bg-brand/5 border border-brand/20 text-sm"><span class="font-semibold text-brand">Рекомендация.</span> Чаще всего замечания по «${Reports._esc(h.top[0].name)}» (${h.top[0].count}). Уделите этому пункту внимание на ближайших сменах.</div>` : "";
      const statusChip = (s) => s === AUDIT_STATUS.COMPLETED
        ? '<span class="text-xs px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-400">завершён</span>'
        : '<span class="text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400">отменён</span>';
      const row = (a) => `<div class="flex items-center rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 overflow-hidden">
        <button data-action="open-history-item" data-id="${a.id}" class="tnk-press flex-1 min-w-0 flex items-center gap-3 p-4 text-left">
          <div class="flex-1 min-w-0"><div class="flex items-center gap-2"><span class="font-medium text-sm truncate">${a.scope === "all" ? "Все подразделения" : App.deptName(a.deptIds[0])}</span>${statusChip(a.status)}</div>
            <div class="text-xs text-slate-500 mt-0.5 truncate">${a.restaurant ? Reports._esc(a.restaurant) + " · " : ""}${Reports._esc(a.auditorName || "")} · ${App.fmtDate(a.startedAt)}</div></div>
          <span class="font-semibold ${App.scoreColor(a.finalScore == null ? 100 : a.finalScore)}">${a.status === AUDIT_STATUS.COMPLETED ? Math.round(a.finalScore == null ? 100 : a.finalScore) + "%" : "—"}</span>
        </button>
        ${canDelete ? `<button data-action="del-audit" data-id="${a.id}" aria-label="Удалить аудит" class="tnk-press shrink-0 w-12 self-stretch grid place-items-center text-slate-400 border-l border-slate-100 dark:border-slate-800">${UI.icon("trash", "w-4 h-4")}</button>` : ""}
      </div>`;
      const list = h.audits.length ? h.audits.map(row).join("") : '<div class="text-center text-sm text-slate-500 py-8">Нет аудитов по выбранным фильтрам.</div>';
      return App.appBar("История", { back: "home" }) + `<main class="max-w-3xl mx-auto px-4 py-6 space-y-4">
        ${filterBar}${filterPanel}${kpi}${chart}${top}${rec}
        <div><h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Аудиты (${h.audits.length})</h2>
        <div class="space-y-2">${list}</div></div></main>`;
    },
    constructor() {
      if (!App.can("checklist.edit")) return App.screens.home();
      const c = App.ctr;

            ${(function scopeTree(pid, depth) {
              return Geo.children(App._geo, pid).map(n => `<label class="flex items-center gap-2 py-1 cursor-pointer" style="margin-left:${depth * 20}px">
                <input type="checkbox" data-field="u-scope" value="${n.id}" ${(d.scope || []).includes(n.id) ? "checked" : ""} class="w-5 h-5 accent-[#EA1B24]">
                <span class="text-[11px] px-1.5 py-0.5 rounded-full bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400">${Geo.TYPES[n.type]}</span>
                <span class="text-sm">${Reports._esc(n.name)}</span></label>` + scopeTree(n.id, depth + 1)).join("");
            })(null, 0)}
          </div>` : ""}
          ${App._departments.length ? `<div class="p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
            <div class="text-[11px] font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Подразделения</div>
            ${App._departments.map(dep => `<label class="flex items-center gap-2 py-1 cursor-pointer"><input type="checkbox" data-field="u-dept" value="${dep.id}" ${(d.deptIds || []).includes(dep.id) ? "checked" : ""} class="w-5 h-5 accent-[#EA1B24]"><span class="text-sm">${Reports._esc(dep.name)}</span></label>`).join("")}
          </div>` : ""}
        </div>
        <label class="flex items-center gap-3 p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 cursor-pointer ${isSelf ? "opacity-50" : ""}">
          <input type="checkbox" data-field="u-active" ${d.active ? "checked" : ""} ${isSelf ? "disabled" : ""} class="w-5 h-5 accent-[#EA1B24]">
          <span class="text-sm font-medium">Активен</span>${isSelf ? '<span class="text-xs text-slate-400">— это вы</span>' : ""}</label>
        ${!isNew && !isSelf ? `<button data-action="adm-user-del" data-id="${d.id}" class="tnk-press w-full h-12 rounded-xl border border-brand/30 text-brand font-medium text-sm inline-flex items-center justify-center gap-2">${UI.icon("trash", "w-4 h-4")}Удалить пользователя</button>` : ""}
      </main>
      <footer class="fixed bottom-0 inset-x-0 z-20 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-t border-slate-200 dark:border-slate-800" style="padding-bottom:env(safe-area-inset-bottom)">
        <div class="max-w-3xl mx-auto px-4 py-3 flex gap-2">
          <button data-route="${backRoute}" class="tnk-press flex-1 h-12 rounded-xl border border-slate-200 dark:border-slate-700 font-medium text-sm text-slate-600 dark:text-slate-300">Отмена</button>
          <button data-action="adm-user-save" class="tnk-press flex-[1.3] h-12 rounded-xl bg-brand text-white font-semibold text-sm">Сохранить</button>
        </div></footer>`;
    },

    role_edit() {
      const d = App.adm.rDraft; if (!d || !App.isAdmin()) return App.screens.home();
      const isNew = !App._roles.some(r => r.id === d.id);
      const locked = !!d.system;
      const all = (d.permissions || []).includes("*");
      const groups = PERMISSION_GROUPS.map(g => `<div class="rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 overflow-hidden">
        <div class="px-4 pt-3 pb-1 text-xs font-semibold uppercase tracking-wider text-slate-400">${g.group}</div>
        ${g.perms.map(p => `<label class="flex items-center gap-3 px-4 py-2.5 border-t border-slate-100 dark:border-slate-800 cursor-pointer ${locked ? "opacity-60" : ""}">
          <input type="checkbox" data-field="r-perm" value="${p.id}" ${all || (d.permissions || []).includes(p.id) ? "checked" : ""} ${locked ? "disabled" : ""} class="w-5 h-5 accent-[#EA1B24]">
          <span class="text-sm">${p.label}</span></label>`).join("")}
      </div>`).join("");
      const inUse = App.users.filter(u => (u.roleIds || []).includes(d.id)).length;
      return App.appBar(isNew ? "Новая роль" : "Роль", { back: "settings" }) + `<main class="max-w-3xl mx-auto px-4 py-6 pb-28 space-y-4">
        <div><label class="block text-sm font-medium mb-2">Название роли</label>
          <input data-field="r-name" value="${Reports._esc(d.name || "")}" ${locked ? "disabled" : ""} placeholder="например, Территориальный управляющий"
            class="w-full h-12 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm ${locked ? "opacity-60" : ""}"></div>
        ${locked ? '<div class="p-3 rounded-xl bg-brand/5 border border-brand/20 text-[13px] text-slate-600 dark:text-slate-300">Системная роль администратора: имеет все права, изменить нельзя.</div>' : ""}
        <div><label class="block text-sm font-medium mb-2">Права</label><div class="space-y-3">${groups}</div></div>
        ${!isNew && !locked ? `<button data-action="adm-role-del" data-id="${d.id}" ${inUse ? "disabled" : ""} class="tnk-press w-full h-12 rounded-xl border border-brand/30 text-brand font-medium text-sm inline-flex items-center justify-center gap-2 ${inUse ? "opacity-50" : ""}">${UI.icon("trash", "w-4 h-4")}${inUse ? `Нельзя удалить — назначена (${inUse})` : "Удалить роль"}</button>` : ""}
      </main>
      <footer class="fixed bottom-0 inset-x-0 z-20 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-t border-slate-200 dark:border-slate-800" style="padding-bottom:env(safe-area-inset-bottom)">
        <div class="max-w-3xl mx-auto px-4 py-3 flex gap-2">
          <button data-route="settings" class="tnk-press flex-1 h-12 rounded-xl border border-slate-200 dark:border-slate-700 font-medium text-sm text-slate-600 dark:text-slate-300">Отмена</button>
          ${locked ? "" : `<button data-action="adm-role-save" class="tnk-press flex-[1.3] h-12 rounded-xl bg-brand text-white font-semibold text-sm">Сохранить</button>`}
        </div></footer>`;
    }
  }
};

/* ===================== Auth (login -> welcome -> PIN 4-6) ===================== */
const Auth = {
  step: "login", loginVal: "", candidate: null, buffer: "", err: "",
  reset() { Auth.step = "login"; Auth.loginVal = ""; Auth.candidate = null; Auth.buffer = ""; Auth.err = ""; },
  screen() { return Auth.step === "pin" ? Auth._pinScreen() : Auth._loginScreen(); },

  _loginScreen() {
    return `<div class="min-h-dvh flex flex-col items-center justify-center px-6 py-10">
      ${UI.logo("h-14 mb-8")}
      <div class="text-[15px] font-medium text-slate-600 dark:text-slate-300 mb-6">Вход в систему</div>
      <div class="w-full max-w-[300px]">
        <label class="block text-sm font-medium mb-2" for="loginInput">Логин</label>
        <input id="loginInput" data-field="auth-login" autocomplete="username" autocapitalize="none" spellcheck="false"
          value="${Reports._esc(Auth.loginVal)}" placeholder="например, liliya"
          class="w-full h-12 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm">
        <div role="alert" aria-live="polite" class="h-5 text-sm text-brand font-medium mt-2">${Auth.err}</div>
        <button data-action="auth-next" class="tnk-press w-full h-12 rounded-xl bg-brand text-white font-semibold text-sm mt-2">Далее</button>
      </div></div>`;
  },

  _pinScreen() {
    const u = Auth.candidate;
    const initials = (u.name || "?").trim().split(/\s+/).map(s => s[0]).slice(0, 2).join("").toUpperCase();
    const avatar = u.photo
      ? `<img src="${u.photo}" alt="" class="w-16 h-16 rounded-full object-cover mb-3">`
      : `<div class="w-16 h-16 grid place-items-center rounded-full bg-brand text-white text-xl font-semibold mb-3">${initials}</div>`;
    const dots = [0,1,2,3,4,5].map(i =>
      `<div class="w-3 h-3 rounded-full transition-colors ${i < Auth.buffer.length ? "bg-brand" : "bg-slate-300 dark:bg-slate-700"}"></div>`).join("");
    const ok = Auth.buffer.length >= 4;
    const keys = ["1","2","3","4","5","6","7","8","9","⌫","0","✓"];
    const pad = keys.map(k => {
      if (k === "⌫") return `<button data-pin="⌫" aria-label="Стереть" class="tnk-press tnk-key h-16 rounded-2xl grid place-items-center text-slate-500 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">${UI.icon("backspace", "w-6 h-6")}</button>`;
      if (k === "✓") return `<button data-pin="✓" aria-label="Войти" ${ok ? "" : "disabled"} class="tnk-press tnk-key h-16 rounded-2xl grid place-items-center border ${ok ? "bg-brand text-white border-brand" : "bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-slate-300 dark:text-slate-600"}">${UI.icon("check", "w-6 h-6")}</button>`;
      return `<button data-pin="${k}" class="tnk-press tnk-key h-16 rounded-2xl text-2xl font-medium bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800">${k}</button>`;
    }).join("");
    return `<div class="min-h-dvh flex flex-col items-center justify-center px-6 py-10">
      ${avatar}
      <div class="text-sm text-slate-500 dark:text-slate-400">Добро пожаловать!</div>
      <div class="font-semibold text-lg">${Reports._esc(u.name)}</div>
      <div class="text-[13px] text-slate-500 dark:text-slate-400 mb-5">${Reports._esc(u.position || "")}</div>
      <div class="flex gap-3 mb-2">${dots}</div>
      <div role="alert" aria-live="polite" class="h-5 text-sm text-brand font-medium mb-4">${Auth.err}</div>
      <div class="grid grid-cols-3 gap-3 w-full max-w-[300px]">${pad}</div>
      <button data-action="auth-back" class="tnk-press mt-6 text-sm text-slate-500 dark:text-slate-400">← Другой пользователь</button>
    </div>`;
  },

  next() {
    const q = (Auth.loginVal || "").trim().toLowerCase();
    if (!q) { Auth.err = "Введите логин"; App.render(); return; }
    const u = App.users.find(x => (x.login || "").toLowerCase() === q && x.active);
    if (!u) { Auth.err = "Пользователь не найден"; App.render(); return; }
    Auth.candidate = u; Auth.step = "pin"; Auth.buffer = ""; Auth.err = "";
    App.render();
  },
  back() { Auth.step = "login"; Auth.candidate = null; Auth.buffer = ""; Auth.err = ""; App.render(); },

  pinPress(k) {
    if (k === "✓") { Auth.submit(); return; }
    if (k === "⌫") Auth.buffer = Auth.buffer.slice(0, -1);
    else if (Auth.buffer.length < 6) Auth.buffer += k;
    Auth.err = "";
    if (Auth.buffer.length === 6) { Auth.submit(); return; }
    App.render();
  },
  submit() {
    if (Auth.buffer.length < 4) { Auth.err = "PIN — от 4 до 6 цифр"; App.render(); return; }
    const u = Auth.candidate;
    if (u && u.pin === Auth.buffer) {
      App.user = u; Session.set({ userId: u.id, route: "home" });
      Auth.reset(); App.route("home");
    } else { Auth.buffer = ""; Auth.err = "Неверный PIN"; App.render(); }
  }
};

/* ===================== Boot ===================== */
if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", App.boot);
else App.boot();

/* Register service worker for PWA install + offline (ignored on file://) */
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
}
</script>
</body>
</html>
