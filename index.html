<script id="app-core">
"use strict";

/* ===================== IndexedDB thin wrapper ===================== */
const IDB = {
  _db: null,
  open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(APP_CONFIG.db.name, APP_CONFIG.db.version);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        Object.keys(DB_SCHEMA).forEach((name) => {
          if (db.objectStoreNames.contains(name)) return;
          const cfg = DB_SCHEMA[name];
          const store = db.createObjectStore(name, { keyPath: cfg.keyPath });
          (cfg.indexes || []).forEach((ix) =>
            store.createIndex(ix.name, ix.keyPath, { unique: !!ix.unique }));
        });
      };
      req.onsuccess = (e) => { this._db = e.target.result; resolve(this._db); };
      req.onerror = (e) => reject(e.target.error);
    });
  },
  _tx(store, mode) { return this._db.transaction(store, mode).objectStore(store); },
  getAll(store) {
    return new Promise((res, rej) => {
      const r = this._tx(store, "readonly").getAll();
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  },
  get(store, key) {
    return new Promise((res, rej) => {
      const r = this._tx(store, "readonly").get(key);
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  },
  put(store, val) {
    return new Promise((res, rej) => {
      const r = this._tx(store, "readwrite").put(val);
      r.onsuccess = () => res(val); r.onerror = () => rej(r.error);
    });
  },
  bulkPut(store, arr) {
    return new Promise((res, rej) => {
      const os = this._tx(store, "readwrite"); let i = 0;
      if (!arr.length) return res(0);
      arr.forEach((v) => { const r = os.put(v); r.onsuccess = () => { if (++i === arr.length) res(i); }; r.onerror = () => rej(r.error); });
    });
  },
  del(store, key) {
    return new Promise((res, rej) => {
      const r = this._tx(store, "readwrite").delete(key);
      r.onsuccess = () => res(true); r.onerror = () => rej(r.error);
    });
  },
  count(store) {
    return new Promise((res, rej) => {
      const r = this._tx(store, "readonly").count();
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  },
  byIndex(store, index, value) {
    return new Promise((res, rej) => {
      const r = this._tx(store, "readonly").index(index).getAll(value);
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  }
};

/* ===================== Data access + first-launch seed ===================== */
const DB = {
  async init() { await IDB.open(); await this.seedIfEmpty(); await this.ensureSeed(); },

  // Fills data that may be missing on already-seeded (upgraded) databases.
  async ensureSeed() {
    if (await IDB.count("roles") === 0) await IDB.bulkPut("roles", SEED.roles);
    const users = await IDB.getAll("users_roles");
    for (const su of SEED.users_roles) {
      const ex = users.find(u => u.id === su.id);
      if (!ex) await IDB.put("users_roles", su);
      else if (!ex.login) await IDB.put("users_roles", Object.assign(ex, { login: su.login, position: su.position, roleIds: su.roleIds, scope: su.scope || [] }));
    }
  },

  async seedIfEmpty() {
    if (await IDB.count("departments") > 0) return;
    await IDB.bulkPut("users_roles", SEED.users_roles);
    await IDB.bulkPut("roles", SEED.roles);
    await IDB.bulkPut("departments", SEED.departments);
    await IDB.bulkPut("penalties", SEED.penalties);
    await IDB.bulkPut("orgRoles", SEED.orgRoles);

    // Flatten BAR checklist -> categories + checkpoints
    const cats = [], checks = [];
    SEED.bar_checklist.forEach((c) => {
      cats.push({ id: c.id, deptId: "dept_bar", code: c.code, name: c.name, weight: c.weight });
      c.checkpoints.forEach((cp) =>
        checks.push({ id: cp.id, deptId: "dept_bar", categoryId: c.id,
          index: cp.index, object: cp.object, criterion: cp.criterion, requirement: cp.requirement }));
    });
    await IDB.bulkPut("checklist_categories", cats);
    await IDB.bulkPut("checklist_structure", checks);
  },

  users()       { return IDB.getAll("users_roles"); },
  saveUser(u)   { return IDB.put("users_roles", u); },
  delUser(id)   { return IDB.del("users_roles", id); },
  roles()       { return IDB.getAll("roles"); },
  saveRole(r)   { return IDB.put("roles", r); },
  delRole(id)   { return IDB.del("roles", id); },
  geoNodes()    { return IDB.getAll("geo_nodes"); },
  saveGeo(n)    { return IDB.put("geo_nodes", n); },
  delGeo(id)    { return IDB.del("geo_nodes", id); },
  positions()   { return IDB.getAll("positions"); },
  savePosition(p) { return IDB.put("positions", p); },
  delPosition(id) { return IDB.del("positions", id); },
  policies()    { return IDB.getAll("dispute_policies"); },
  savePolicy(p) { return IDB.put("dispute_policies", p); },
  delPolicy(id) { return IDB.del("dispute_policies", id); },
  access()      { return IDB.getAll("report_access"); },
  saveAccess(g) { return IDB.put("report_access", g); },
  delAccess(id) { return IDB.del("report_access", id); },
  concepts()    { return IDB.getAll("concepts").then(c => c.sort((a, b) => (a.order || 0) - (b.order || 0))); },
  saveConcept(c){ return IDB.put("concepts", c); },
  delConcept(id){ return IDB.del("concepts", id); },
  saveDept(d)   { return IDB.put("departments", d); },
  delDept(id)   { return IDB.del("departments", id); },
  saveCategory(c) { return IDB.put("checklist_categories", c); },
  delCategory(id) { return IDB.del("checklist_categories", id); },
  saveCheckpoint(c) { return IDB.put("checklist_structure", c); },
  delCheckpoint(id) { return IDB.del("checklist_structure", id); },
  logVersion(v) { return IDB.put("checklist_versions", v); },
  versions(deptId) { return IDB.byIndex("checklist_versions", "deptId", deptId); },
  logAction(l)  { return IDB.put("audit_log", l); },
  auditLog()    { return IDB.getAll("audit_log"); },
  notifyPut(n)  { return IDB.put("notifications", n); },

  schedules()   { return IDB.getAll("schedules"); },

  delSchedule(id) { return IDB.del("schedules", id); },
  departments() { return IDB.getAll("departments").then(d => d.sort((a,b)=>a.order-b.order)); },
  penalties()   { return IDB.getAll("penalties").then(p => p.sort((a, b) => a.percent - b.percent)); },
  orgRoles()    { return IDB.getAll("orgRoles").then(r => r.sort((a,b)=>a.order-b.order)); },
  categories(deptId) { return IDB.byIndex("checklist_categories", "deptId", deptId); },
  checkpoints(deptId) { return IDB.byIndex("checklist_structure", "deptId", deptId); },
  audits()      { return IDB.getAll("audits_history"); },

/* ===================== Scoring engine (percentage model) ===================== */
const Scoring = {
  // categories: [{id,weight}], structure: [{id,categoryId}], violations: [{checkpointId,penaltyPercent}]
  categoryScores(categories, structure, violations) {
    const cpToCat = {}; structure.forEach(s => cpToCat[s.id] = s.categoryId);
    const scores = {}; categories.forEach(c => scores[c.id] = 100);
    violations.forEach(v => {
      const cat = v.categoryId || cpToCat[v.checkpointId];
      if (cat == null || scores[cat] == null) return;
      scores[cat] = Math.max(0, scores[cat] - (Number(v.penaltyPercent) || 0));
    });
    return scores; // {categoryId: percent}
  },
  deptScore(categories, catScores) {
    const totW = categories.reduce((s, c) => s + (Number(c.weight) || 0), 0) || 1;
    const sum = categories.reduce((s, c) => s + catScores[c.id] * (Number(c.weight) || 0), 0);
    return Math.round((sum / totW) * 10) / 10;
  },
  finalScore(deptScores) {
    const vals = Object.values(deptScores);
    if (!vals.length) return 0;
    return Math.round((vals.reduce((a, b) => a + b, 0) / vals.length) * 10) / 10;
  }
};

/* ===================== Sync (Google Apps Script) ===================== */
const Sync = {
  online: navigator.onLine,
  async ping() {
    if (!APP_CONFIG.apiUrl) return false;
    try {
      const r = await fetch(APP_CONFIG.apiUrl + "?action=ping", { method: "GET" });
      const j = await r.json(); return !!j.ok;
    } catch (e) { return false; }
  },
  async pushAudit(audit, violations) {
    if (!APP_CONFIG.apiUrl) throw new Error("apiUrl not set");
    const res = await fetch(APP_CONFIG.apiUrl, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" }, // simple request -> no CORS preflight
      body: JSON.stringify({ type: "audit_sync", audit, violations })
    });
    return res.json();
  },
  // Offline-safe queue: enqueue on finish/abort, flush when online.
  _flushing: false,
  async enqueue(auditId) {
    try { await IDB.put("syncQueue", { qid: "q_" + auditId, auditId, createdAt: Date.now() }); } catch (e) {}
    Sync.flush();
  },
  async dequeue(auditId) { try { await IDB.del("syncQueue", "q_" + auditId); } catch (e) {} },
  async flush() {
    if (Sync._flushing || !APP_CONFIG.apiUrl || !navigator.onLine) return;
    Sync._flushing = true;
    let progressed = false;
    try {
      const q = await IDB.getAll("syncQueue");
      for (const item of q) {
        const audit = await IDB.get("audits_history", item.auditId);
        if (!audit) { await IDB.del("syncQueue", item.qid); progressed = true; continue; }
        try {
          const vios = await DB.violations(item.auditId);
          const res = await Sync.pushAudit(audit, vios);
          if (res && res.ok) { await IDB.del("syncQueue", item.qid); progressed = true; }
          else break; // server error -> keep queue, retry on next trigger
        } catch (e) { break; } // network error -> keep queue, retry on next trigger
      }
    } finally {
      Sync._flushing = false;
      // Only re-drain if we made progress AND items remain (added mid-flush) — avoids hammering on persistent errors.
      if (progressed && navigator.onLine && (await Sync.pendingCount()) > 0) setTimeout(() => Sync.flush(), 1500);
    }
  },
  async pendingCount() { try { return (await IDB.getAll("syncQueue")).length; } catch (e) { return 0; } }
};

/* ===================== Media: client-side image compression ===================== */
const Media = {
  compress(file, maxDim, quality) {
    maxDim = maxDim || 1280; quality = quality || 0.7;
    return new Promise((resolve, reject) => {
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        let { width: w, height: h } = img;
        if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
        else if (h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
        const cv = document.createElement("canvas"); cv.width = w; cv.height = h;
        cv.getContext("2d").drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        resolve(cv.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("image load failed")); };
      img.src = url;
    });
  }
};

/* ===================== Voice: speech-to-text (webkitSpeechRecognition) ===================== */
const Voice = {
  rec: null, active: false,
  supported() { return "webkitSpeechRecognition" in window || "SpeechRecognition" in window; },
  toggle(onResult, onEnd) {
    if (this.active) { this.stop(); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return false;
    const r = new SR();
    r.lang = "ru-RU"; r.interimResults = true; r.continuous = true;
    let finalText = "";
    r.onresult = (e) => {
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalText += t + " "; else interim += t;
      }
      onResult(finalText + interim);
    };
    r.onend = () => { this.active = false; if (onEnd) onEnd(finalText.trim()); };
    r.onerror = () => { this.active = false; if (onEnd) onEnd(finalText.trim()); };
    this.rec = r; this.active = true; r.start();
    return true;
  },
  stop() { if (this.rec) { try { this.rec.stop(); } catch (e) {} } this.active = false; }
};

/* ===================== Audit controller ===================== */
const Audit = {
  // Active audit + cached checklist data for the run
  active: null,
  data: { categories: {}, checkpoints: {}, violations: [] },
  ui: { deptId: null, openCat: null },

  deptsWithContent(all) {
    return all.filter(d => (Audit.data.categories[d.id] || []).length > 0);
  },

  async start(scope, deptIds) {
    const now = new Date();
    Audit.active = {
      id: "aud_" + now.getTime(),
      auditorId: App.user.id, auditorName: App.user.name,
      scope: scope, deptIds: deptIds.slice(),
      restaurantId: App.setup.restaurantId || "",
      restaurant: (function () { const r = (App.setup.restaurants || []).find(x => x.id === App.setup.restaurantId); return r ? r.name : ""; })(),
      startedAt: now.toISOString(),
      status: AUDIT_STATUS.IN_PROGRESS,
      finishedAt: null, scores: {}, finalScore: null
    };
    await Audit._loadData(deptIds);
    // Freeze the checklist version into the audit (immutability — old audits keep their structure)
    Audit.active.checklist = {};
    deptIds.forEach(id => { Audit.active.checklist[id] = { categories: Audit.data.categories[id] || [], checkpoints: Audit.data.checkpoints[id] || [] }; });
    Audit.data.violations = [];
    Audit.ui = { deptId: deptIds[0], openCat: null };
    await DB.saveAudit(Audit.active);
    App.route("audit_run");
  },

  // Populate Audit.data from the frozen snapshot if present, else load live (legacy audits)
  async _hydrate(a) {
    if (a.checklist) {
      Audit.data.categories = {}; Audit.data.checkpoints = {};
      (a.deptIds || []).forEach(id => { const s = a.checklist[id] || {}; Audit.data.categories[id] = s.categories || []; Audit.data.checkpoints[id] = s.checkpoints || []; });
    } else await Audit._loadData(a.deptIds);
  },

  async resume(id) {
    const a = await IDB.get("audits_history", id);
    if (!a) return;
    Audit.active = a;
    await Audit._hydrate(a);
    Audit.data.violations = await DB.violations(id);
    Audit.ui = { deptId: a.deptIds[0], openCat: null };
    if (a.status === AUDIT_STATUS.PAUSED) { a.status = AUDIT_STATUS.IN_PROGRESS; await DB.saveAudit(a); }
    App.route("audit_run");
  },

  async _loadData(deptIds) {
    Audit.data.categories = {}; Audit.data.checkpoints = {};
    for (const id of deptIds) {
      const cats = (await DB.categories(id)).sort((a, b) => Number(a.code) - Number(b.code));
      const chks = (await DB.checkpoints(id)).sort((a, b) => {
        const pa = String(a.index).split(".").map(Number), pb = String(b.index).split(".").map(Number);
        return (pa[0] - pb[0]) || ((pa[1] || 0) - (pb[1] || 0));
      });
      Audit.data.categories[id] = cats;
      Audit.data.checkpoints[id] = chks;
    }
  },

  violationsFor(checkpointId) {
    return Audit.data.violations.filter(v => v.checkpointId === checkpointId);
  },

  recompute() {
    const a = Audit.active; const scores = {};
    a.deptIds.forEach(deptId => {
      const cats = Audit.data.categories[deptId] || [];
      const struct = Audit.data.checkpoints[deptId] || [];
      const vios = Audit.data.violations.filter(v => v.deptId === deptId);
      const catScores = Scoring.categoryScores(cats, struct, vios);
      scores[deptId] = { categories: catScores, score: Scoring.deptScore(cats, catScores) };
    });
    a.scores = scores;
    a.finalScore = Scoring.finalScore(Object.fromEntries(a.deptIds.map(d => [d, scores[d].score])));
    return a;
  },

  async persist() { await DB.saveAudit(Audit.recompute()); },

  async addViolation(v) {
    Audit.data.violations.push(v);
    await DB.saveViolation(v);
    await Audit.persist();
  },
  async removeViolation(id) {
    Audit.data.violations = Audit.data.violations.filter(x => x.id !== id);
    await IDB.del("audit_violations", id);
    await Audit.persist();
  },

  async pause()  { Audit.active.status = AUDIT_STATUS.PAUSED; await Audit.persist(); Audit.active = null; App.route("home"); },
  async finish() { const a = Audit.active; a.status = AUDIT_STATUS.COMPLETED; a.finishedAt = new Date().toISOString(); await Audit.persist(); Sync.enqueue(a.id); App.route("audit_done"); },
  async abort()  { const a = Audit.active; a.status = AUDIT_STATUS.ABORTED; a.finishedAt = new Date().toISOString(); await Audit.persist(); Sync.enqueue(a.id); Audit.active = null; App.route("home"); }
};

/* ===================== Reports (PDF / Excel / HTML) ===================== */
const Reports = {
  _roleTitle(id, roles) { const r = roles.find(x => x.id === id); return r ? r.title : ""; },
  _cp(deptData, deptId, cpId) { return (deptData.checkpoints[deptId] || []).find(c => c.id === cpId) || {}; },
  _color(p) { return p >= 90 ? "#059669" : p >= 75 ? "#d97706" : "#EA1B24"; },
  _esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); },
  fname(m, ext) { return `Аудит_${m.scope}_${new Date().toISOString().slice(0, 10)}.${ext}`.replace(/\s+/g, "_"); },

  buildModel(audit, deptData, violations, orgRoles) {
    const depts = audit.deptIds.map(id => {
      const sc = audit.scores[id] || { categories: {}, score: 100 };
      const cats = (deptData.categories[id] || []).map(c => ({ name: c.name, weight: c.weight, score: Math.round(sc.categories[c.id] != null ? sc.categories[c.id] : 100) }));
      return { id, name: App.deptName(id), score: Math.round(sc.score), categories: cats };
    });
    const vios = violations.map(v => {
      const cp = Reports._cp(deptData, v.deptId, v.checkpointId);
      return { deptName: App.deptName(v.deptId), index: cp.index || "", object: cp.object || "", criterion: cp.criterion || "",
        severity: v.severity, penalty: v.penaltyPercent, comment: v.comment || "", assignee: Reports._roleTitle(v.assigneeRole, orgRoles),
        time: App.fmtTime(v.createdAt), photos: v.photos || [] };
    });
    return {
      auditor: audit.auditorName, date: App.fmtDate(audit.startedAt),
      restaurant: audit.restaurant || "",
      scope: audit.scope === "all" ? "Все подразделения" : App.deptName(audit.deptIds[0]),
      finalScore: Math.round(audit.finalScore == null ? 100 : audit.finalScore),
      depts, violations: vios,
      critical: vios.filter(v => v.severity === SEVERITY.CRITICAL),
      nonCritical: vios.filter(v => v.severity !== SEVERITY.CRITICAL)
    };
  },
  async current() {
    const orgRoles = await DB.orgRoles();
    return Reports.buildModel(Audit.active, Audit.data, Audit.data.violations, orgRoles);
  },

  _vioBlock(v) {
    const badge = v.severity === SEVERITY.CRITICAL
      ? '<span style="background:#EA1B24;color:#fff;font-size:11px;padding:2px 8px;border-radius:999px">Критично</span>'
      : '<span style="background:#e2e8f0;color:#334155;font-size:11px;padding:2px 8px;border-radius:999px">Некритично</span>';
    const photos = v.photos.length
      ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">${v.photos.map(p => `<img src="${p}" style="width:120px;height:120px;object-fit:cover;border-radius:8px;border:1px solid #e2e8f0" class="rep-photo">`).join("")}</div>` : "";
    return `<div style="border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin-bottom:10px;break-inside:avoid">
      <div style="display:flex;justify-content:space-between;gap:8px;align-items:center">
        <div style="font-size:12px;color:#64748b">${Reports._esc(v.deptName)} · ${Reports._esc(v.index)} · ${Reports._esc(v.criterion)}</div>
        <div style="display:flex;gap:6px;align-items:center">${badge}<span style="color:#EA1B24;font-weight:600;font-size:12px">−${v.penalty}%</span></div>
      </div>
      <div style="font-weight:600;margin-top:2px">${Reports._esc(v.object)}</div>
      ${v.comment ? `<div style="font-size:13px;color:#334155;margin-top:4px">${Reports._esc(v.comment)}</div>` : ""}
      <div style="font-size:12px;color:#64748b;margin-top:6px">${v.assignee ? "Ответственный: " + Reports._esc(v.assignee) + " · " : ""}${v.time}</div>
      ${photos}</div>`;
  },
  htmlBody(m) {
    const deptRows = m.depts.map(d => `
      <tr><td style="padding:8px;border-bottom:1px solid #eef2f7;font-weight:600">${Reports._esc(d.name)}</td>
        <td style="padding:8px;border-bottom:1px solid #eef2f7;text-align:right;color:${Reports._color(d.score)};font-weight:700">${d.score}%</td></tr>
      ${d.categories.map(c => `<tr><td style="padding:4px 8px 4px 20px;border-bottom:1px solid #f8fafc;color:#475569;font-size:13px">${Reports._esc(c.name)} <span style="color:#94a3b8">· вес ${c.weight}%</span></td>
        <td style="padding:4px 8px;border-bottom:1px solid #f8fafc;text-align:right;color:${Reports._color(c.score)};font-size:13px">${c.score}%</td></tr>`).join("")}`).join("");
    return `<div style="font-family:Inter,Arial,sans-serif;color:#0f172a;max-width:800px;margin:0 auto">
      <div style="display:flex;align-items:center;gap:12px;border-bottom:2px solid #EA1B24;padding-bottom:12px;margin-bottom:16px">
        <svg width="64" height="40" viewBox="0 0 200 122"><rect x="3" y="3" width="194" height="116" rx="22" fill="#EA1B24"/><text x="100" y="55" text-anchor="middle" font-family="Arial" font-weight="800" font-size="38" fill="#fff">TANUKI</text><text x="100" y="100" text-anchor="middle" font-family="Arial" font-weight="800" font-size="38" fill="#fff">FAMILY</text></svg>
        <div><div style="font-size:20px;font-weight:700">Отчёт по аудиту</div>
          <div style="font-size:13px;color:#64748b">${m.restaurant ? Reports._esc(m.restaurant) + " · " : ""}${Reports._esc(m.scope)} · ${Reports._esc(m.date)} · Аудитор: ${Reports._esc(m.auditor)}</div></div>
        <div style="margin-left:auto;text-align:right"><div style="font-size:11px;color:#64748b">Итог</div>
          <div style="font-size:34px;font-weight:800;color:${Reports._color(m.finalScore)}">${m.finalScore}%</div></div>
      </div>
      <table style="width:100%;border-collapse:collapse;margin-bottom:20px">${deptRows}</table>
      <div style="font-weight:700;margin:12px 0 8px;color:#EA1B24">Критические нарушения (${m.critical.length})</div>
      ${m.critical.length ? m.critical.map(Reports._vioBlock).join("") : '<div style="color:#94a3b8;font-size:13px;margin-bottom:12px">Нет</div>'}
      <div style="font-weight:700;margin:12px 0 8px">Некритические нарушения (${m.nonCritical.length})</div>
      ${m.nonCritical.length ? m.nonCritical.map(Reports._vioBlock).join("") : '<div style="color:#94a3b8;font-size:13px">Нет</div>'}
    </div>`;
  },
  htmlDoc(m) {
    return `<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Отчёт · ${Reports._esc(m.scope)}</title>
      <style>body{margin:0;padding:20px;background:#f8fafc}.rep-photo{cursor:zoom-in}#lb{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:99}#lb img{max-width:95%;max-height:95%}</style></head>
      <body>${Reports.htmlBody(m)}<div id="lb" onclick="this.style.display='none'"><img></div>
      <script>document.querySelectorAll('.rep-photo').forEach(function(i){i.onclick=function(){var lb=document.getElementById('lb');lb.querySelector('img').src=i.src;lb.style.display='flex'}})<\/script></body></html>`;
  },
  _download(name, blob) { const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 3000); },

  async exportHTML() { const m = await Reports.current(); Reports._download(Reports.fname(m, "html"), new Blob([Reports.htmlDoc(m)], { type: "text/html;charset=utf-8" })); },
  async exportPDF() {
    if (!window.html2pdf) { alert("Библиотека PDF ещё не загрузилась (нужен интернет при первом запуске)."); return; }
    const m = await Reports.current();
    const el = document.createElement("div"); el.style.padding = "12px"; el.style.background = "#fff"; el.innerHTML = Reports.htmlBody(m);
    window.html2pdf().set({ margin: 8, filename: Reports.fname(m, "pdf"), image: { type: "jpeg", quality: 0.92 },
      html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }, pagebreak: { mode: ["css", "avoid-all"] } }).from(el).save();
  },
  async exportExcel() {
    if (!window.XLSX) { alert("Библиотека Excel ещё не загрузилась (нужен интернет при первом запуске)."); return; }
    const m = await Reports.current();
    const summary = [["Отчёт по аудиту"], ["Ресторан", m.restaurant || "—"], ["Аудитор", m.auditor], ["Дата", m.date], ["Охват", m.scope], ["Итоговая оценка", m.finalScore + "%"], [],
      ["Подразделение", "Категория", "Вес %", "Оценка %"]];
    m.depts.forEach(d => { summary.push([d.name, "", "", d.score]); d.categories.forEach(c => summary.push(["", c.name, c.weight, c.score])); });
    const vh = [["Подразделение", "Индекс", "Объект", "Критерий", "Тип", "Штраф %", "Комментарий", "Ответственный", "Время"]];
    m.violations.forEach(v => vh.push([v.deptName, v.index, v.object, v.criterion, v.severity === SEVERITY.CRITICAL ? "Критично" : "Некритично", v.penalty, v.comment, v.assignee, v.time]));
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(summary), "Сводка");
    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(vh), "Нарушения");
    window.XLSX.writeFile(wb, Reports.fname(m, "xlsx"));
  },

  _csv(rows) { return "﻿" + rows.map(r => r.map(v => `"${String(v == null ? "" : v).replace(/"/g, '""')}"`).join(";")).join("\r\n"); },
  async exportAuditCSV() {
    const m = await Reports.current();
    const rows = [["Ресторан", m.restaurant || "—"], ["Аудитор", m.auditor], ["Дата", m.date], ["Охват", m.scope], ["Итог %", m.finalScore], [],
      ["Подразделение", "Индекс", "Объект", "Критерий", "Тип", "Штраф %", "Комментарий", "Ответственный", "Время"]];
    m.violations.forEach(v => rows.push([v.deptName, v.index, v.object, v.criterion, v.severity === SEVERITY.CRITICAL ? "Критично" : "Некритично", v.penalty, v.comment, v.assignee, v.time]));
    Reports._download(Reports.fname(m, "csv"), new Blob([Reports._csv(rows)], { type: "text/csv;charset=utf-8" }));
  },
  exportTasksCSV() {
    const list = App.filteredTasks();
    const roleTitle = (id) => (App._orgRoles.find(r => r.id === id) || {}).title || "";
    const st = { open: "Открыто", fix_submitted: "На проверке", dispute_rejected: "Оспаривание отклонено" };
    const rows = [["Объект", "Ресторан", "Подразделение", "Ответственный", "Статус", "Срок", "Просрочено", "Повтор"]];
    list.forEach(t => rows.push([t.object, t.a.restaurant || "", App.deptName(t.v.deptId), roleTitle(t.v.assigneeRole), st[t.v.status] || t.v.status, t.v.deadline || "бессрочно", App._isOverdue(t.v) ? "да" : "", t.repeat > 1 ? t.repeat : ""]));
    Reports._download("Задачи_" + new Date().toISOString().slice(0, 10) + ".csv", new Blob([Reports._csv(rows)], { type: "text/csv;charset=utf-8" }));
  },

  // Export a department's checklist as a standard (Excel with 2 sheets + CSV fallback)
  async exportChecklist(deptId) {
    const cats = (await DB.categories(deptId)).sort((a, b) => Number(a.code) - Number(b.code));
    const checks = (await DB.checkpoints(deptId)).sort((a, b) => { const pa = String(a.index).split(".").map(Number), pb = String(b.index).split(".").map(Number); return (pa[0] - pb[0]) || ((pa[1] || 0) - (pb[1] || 0)); });
    const depName = (App._departments.find(d => d.id === deptId) || {}).name || deptId;
    const catName = {}; cats.forEach(c => catName[c.id] = c.name);
    const modeTxt = (cp) => SEVMODE_LABEL[cp.severityMode || SEVMODE.RANGE] + (cp.severityMode === SEVMODE.FIXED ? " " + (cp.fixedPenalty || 0) + "%" : "");
    if (!window.XLSX) { // CSV fallback
      const rows = [["Категория", "Вес %", "Индекс", "Объект", "Критерий", "Требование", "Режим оценки"]];
      checks.forEach(cp => { const c = cats.find(x => x.id === cp.categoryId) || {}; rows.push([c.name || "", c.weight || "", cp.index || "", cp.object || "", cp.criterion || "", cp.requirement || "", modeTxt(cp)]); });
      const csv = "﻿" + rows.map(r => r.map(v => `"${String(v == null ? "" : v).replace(/"/g, '""')}"`).join(";")).join("\r\n");
      Reports._download("Чеклист_" + depName + ".csv", new Blob([csv], { type: "text/csv;charset=utf-8" }));
      return;
    }
    const catSheet = [["Категория", "Вес %"]]; cats.forEach(c => catSheet.push([c.name, c.weight]));
    const cpSheet = [["Категория", "Индекс", "Объект", "Критерий", "Требование", "Режим оценки"]];
    checks.forEach(cp => cpSheet.push([catName[cp.categoryId] || "", cp.index || "", cp.object || "", cp.criterion || "", cp.requirement || "", modeTxt(cp)]));
    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(catSheet), "Категории");
    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.aoa_to_sheet(cpSheet), "Пункты");
    window.XLSX.writeFile(wb, ("Чеклист_" + depName + ".xlsx").replace(/\s+/g, "_"));
  },

    const audits = App.hist.audits || [], vios = App.hist.vios || [];

      ["Аудитов", audits.length], ["Средняя оценка", avg + (avg === "—" ? "" : "%")], ["Всего нарушений", vios.length],
      []
    ];
    // by restaurant
    const byR = {}; completed.forEach(a => { const k = a.restaurant || "—"; (byR[k] = byR[k] || []).push(a.finalScore == null ? 100 : a.finalScore); });
    filterDesc.push(["По ресторанам", "Аудитов", "Средняя %"]);
    Object.entries(byR).forEach(([k, arr]) => filterDesc.push([k, arr.length, Math.round(arr.reduce((s, x) => s + x, 0) / arr.length)]));
    filterDesc.push([]);
    // by auditor
    const byA = {}; completed.forEach(a => { const k = a.auditorName || "—"; (byA[k] = byA[k] || []).push(a.finalScore == null ? 100 : a.finalScore); });
    filterDesc.push(["По проверяющим", "Аудитов", "Средняя %"]);
    Object.entries(byA).forEach(([k, arr]) => filterDesc.push([k, arr.length, Math.round(arr.reduce((s, x) => s + x, 0) / arr.length)]));

    const auditsSheet = [["Дата", "Ресторан", "Проверяющий", "Охват", "Статус", "Итог %", "Нарушений"]];

/* ===================== Geo tree helper (Country -> [Region] -> City -> Restaurant) ===================== */
const Geo = {
  TYPES: { country: "Страна", region: "Регион", city: "Город", restaurant: "Ресторан" },
  CHILD: { country: ["region", "city"], region: ["city"], city: ["restaurant"], restaurant: [] },
  children(list, pid) { return list.filter(n => (n.parentId || null) === (pid || null)); },
  descendants(list, id) {
    const out = [];
    const walk = (pid) => Geo.children(list, pid).forEach(c => { out.push(c); walk(c.id); });
    walk(id); return out;
  },
  // Expands scope node ids to the set of restaurant ids inside their subtrees
  restaurantsUnder(list, ids) {
    const set = new Set();
    (ids || []).forEach(id => {
      const n = list.find(x => x.id === id);
      if (!n) return;
      if (n.type === "restaurant") set.add(n.id);
      Geo.descendants(list, id).forEach(d => { if (d.type === "restaurant") set.add(d.id); });
    });
    return set;
  }
};

/* ===================== Photo editor (canvas markers) ===================== */
const PhotoEdit = {
  idx: null, tool: "circle", shapes: [], img: null, cv: null, ctx: null, start: null,
  open(idx) { PhotoEdit.idx = idx; PhotoEdit.tool = "circle"; PhotoEdit.shapes = (VForm.draft.markers[idx] || []).slice(); App.route("photo_edit"); },
  init() {
    const cv = document.getElementById("editCanvas"); if (!cv) return;
    const img = new Image();
    img.onload = () => {
      const maxW = cv.parentElement.clientWidth;
      const scale = Math.min(1, maxW / img.width);
      cv.width = Math.round(img.width * scale); cv.height = Math.round(img.height * scale);
      PhotoEdit.img = img; PhotoEdit.cv = cv; PhotoEdit.ctx = cv.getContext("2d"); PhotoEdit.redraw();
    };
    img.src = VForm.draft.photos[PhotoEdit.idx];
    let drawing = false;
    const pos = (e) => { const r = cv.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return { x: t.clientX - r.left, y: t.clientY - r.top }; };
    const down = (e) => { e.preventDefault(); drawing = true; PhotoEdit.start = pos(e); };
    const move = (e) => { if (!drawing) return; e.preventDefault(); const p = pos(e); PhotoEdit.redraw(); PhotoEdit._shape(PhotoEdit.start, p); };
    const up = (e) => { if (!drawing) return; drawing = false; const p = pos(e); const s = PhotoEdit.start;
      PhotoEdit.shapes.push({ tool: PhotoEdit.tool, x1: s.x / cv.width, y1: s.y / cv.height, x2: p.x / cv.width, y2: p.y / cv.height });
      PhotoEdit.redraw(); };
    cv.onmousedown = down; cv.onmousemove = move; window.addEventListener("mouseup", up, { once: false });
    cv.ontouchstart = down; cv.ontouchmove = move; cv.ontouchend = up;
    PhotoEdit._up = up;
  },
  redraw() { const p = PhotoEdit; if (!p.ctx) return; p.ctx.drawImage(p.img, 0, 0, p.cv.width, p.cv.height); p.shapes.forEach(s => p._draw(s)); },
  _shape(a, b) { PhotoEdit._draw({ tool: PhotoEdit.tool, x1: a.x / PhotoEdit.cv.width, y1: a.y / PhotoEdit.cv.height, x2: b.x / PhotoEdit.cv.width, y2: b.y / PhotoEdit.cv.height }); },
  _draw(s) {
    const { ctx, cv } = PhotoEdit; if (!ctx) return;
    ctx.strokeStyle = "#EA1B24"; ctx.lineWidth = Math.max(3, cv.width * 0.008); ctx.lineCap = "round"; ctx.lineJoin = "round";
    const x1 = s.x1 * cv.width, y1 = s.y1 * cv.height, x2 = s.x2 * cv.width, y2 = s.y2 * cv.height;
    if (s.tool === "circle") {
      ctx.beginPath(); ctx.ellipse((x1 + x2) / 2, (y1 + y2) / 2, Math.abs(x2 - x1) / 2, Math.abs(y2 - y1) / 2, 0, 0, Math.PI * 2); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      const ang = Math.atan2(y2 - y1, x2 - x1), h = Math.max(12, cv.width * 0.035);
      ctx.beginPath(); ctx.moveTo(x2, y2); ctx.lineTo(x2 - h * Math.cos(ang - 0.4), y2 - h * Math.sin(ang - 0.4));
      ctx.moveTo(x2, y2); ctx.lineTo(x2 - h * Math.cos(ang + 0.4), y2 - h * Math.sin(ang + 0.4)); ctx.stroke();
    }
  },
  undo() { PhotoEdit.shapes.pop(); PhotoEdit.redraw(); },
  save() {
    const img = PhotoEdit.img;
    const full = document.createElement("canvas"); full.width = img.width; full.height = img.height;
    const fx = full.getContext("2d"); fx.drawImage(img, 0, 0);
    const savedCv = PhotoEdit.cv, savedCtx = PhotoEdit.ctx;
    PhotoEdit.cv = full; PhotoEdit.ctx = fx; PhotoEdit.shapes.forEach(s => PhotoEdit._draw(s));
    PhotoEdit.cv = savedCv; PhotoEdit.ctx = savedCtx;
    VForm.draft.photos[PhotoEdit.idx] = full.toDataURL("image/jpeg", 0.7);
    VForm.draft.markers[PhotoEdit.idx] = PhotoEdit.shapes.slice();
    App.route("violation");
  }
};

/* ===================== Workflow: corrective actions & disputes ===================== */
const Workflow = {
  ctx: null, // { auditId, vio, composerPhotos: [] }

  meta(s) {
    switch (s) {
      case VIO_STATUS.FIX_SUBMITTED:   return { label: "На проверке", cls: "bg-amber-50 text-amber-700 dark:bg-amber-500/10 dark:text-amber-400" };
      case VIO_STATUS.RESOLVED:        return { label: "Исправлено", cls: "bg-emerald-50 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-400" };
      case VIO_STATUS.DISPUTED:        return { label: "Оспаривается", cls: "bg-violet-50 text-violet-700 dark:bg-violet-500/10 dark:text-violet-400" };
      case VIO_STATUS.DISPUTE_UPHELD:  return { label: "Оспорено (снято)", cls: "bg-emerald-50 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-400" };
      case VIO_STATUS.DISPUTE_REJECTED:return { label: "Оспаривание отклонено", cls: "bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400" };
      default:                         return { label: "Открыто", cls: "bg-brand/10 text-brand" };
    }
  },
  // Rank via position tree depth (0 = top). No position = lowest (Infinity).
  rankOf(positionId) {
    if (!positionId) return Infinity;
    let d = 0, cur = App._positions.find(p => p.id === positionId);
    const seen = new Set();
    while (cur && cur.parentId && !seen.has(cur.id)) { seen.add(cur.id); cur = App._positions.find(p => p.id === cur.parentId); d++; }
    return cur ? d : Infinity;
  },
  auditorOf(audit) { return App.users.find(u => u.id === audit.auditorId); },
  canResolve(audit) {
    if (!App.can("task.resolve")) return false;
    const aud = Workflow.auditorOf(audit);
    // Rank gate: resolver's rank must be >= auditor's rank (same or higher position).
    return Workflow.rankOf(App.user.positionId) <= Workflow.rankOf(aud ? aud.positionId : null);
  },
  // Applicable dispute policy: per-restaurant, else "default", else null (legacy any-approver)
  getPolicy(audit) {
    const pol = (App._policies || []);
    const byRest = pol.find(p => p.id === (audit.restaurantId || "") && (p.approvers || []).length);
    if (byRest) return byRest;
    const def = pol.find(p => p.id === "default" && (p.approvers || []).length);
    return def || null;
  },
  // Approver of a dispute: in policy's approver list; else legacy (dispute.approve + scope)
  isApprover(audit) {
    if (!App.can("dispute.approve")) return false;
    const pol = Workflow.getPolicy(audit);
    if (pol) return pol.approvers.some(a => a.userId === App.user.id);
    if (!(App.user.scope || []).length) return true;
    if (!audit.restaurantId) return true;
    return Geo.restaurantsUnder(App._geo, App.user.scope).has(audit.restaurantId);
  },
  // Returns "upheld" | "rejected" | "pending"
  evaluate(dispute, pol) {
    const votes = dispute.votes || [];
    if (!votes.length) return "pending";
    if (!pol) { const last = votes[votes.length - 1]; return last.approve ? "upheld" : "rejected"; }
    // Override approver decides unilaterally
    const overrideIds = new Set(pol.approvers.filter(a => a.canOverride).map(a => a.userId));
    const ov = votes.find(v => overrideIds.has(v.userId));
    if (ov) return ov.approve ? "upheld" : "rejected";
    const wOf = (uid) => { const a = pol.approvers.find(x => x.userId === uid); return a ? (Number(a.weight) || 1) : 0; };
    const totalW = pol.approvers.reduce((s, a) => s + (Number(a.weight) || 1), 0) || 1;
    const appW = votes.filter(v => v.approve).reduce((s, v) => s + wOf(v.userId), 0);
    const rejW = votes.filter(v => !v.approve).reduce((s, v) => s + wOf(v.userId), 0);
    if (pol.mode === "unanimous") {
      if (rejW > 0) return "rejected";
      const approvedCount = pol.approvers.filter(a => votes.some(v => v.userId === a.userId && v.approve)).length;
      return approvedCount >= pol.approvers.length ? "upheld" : "pending";
    }
    const need = ((Number(pol.threshold) || 60) / 100) * totalW;
    if (appW >= need) return "upheld";
    if (rejW > totalW - need) return "rejected";
    return "pending";
  },
  policySummary(audit) {
    const pol = Workflow.getPolicy(audit); if (!pol) return "";
    const names = (pol.approvers || []).map(a => { const u = App.users.find(x => x.id === a.userId); return (u ? u.name : "?") + (a.canOverride ? "★" : "") + "×" + (a.weight || 1); }).join(", ");
    const mode = pol.mode === "unanimous" ? "единогласно" : "порог " + (pol.threshold || 60) + "%";
    return mode + " · " + names;
  },

  open(auditId, vioId) {
    const vio = Audit.data.violations.find(v => v.id === vioId);
    if (!vio) return;
    if (!vio.status) vio.status = VIO_STATUS.OPEN;
    Workflow.ctx = { auditId, vio, composerPhotos: [] };
    App.route("vio_detail");
  },

  _entry(kind, text) {
    return { author: (kind === "fix" || kind === "dispute") ? THREAD_AUTHOR.RESTAURANT : THREAD_AUTHOR.AUDITOR,
      name: App.user.name, role: App.user.position || "", kind, text: text || "",
      photos: (Workflow.ctx.composerPhotos || []).slice(), ts: new Date().toISOString() };
  },
  async _save() {
    const v = Workflow.ctx.vio;
    await DB.saveViolation(v);
    // keep in-memory audit data in sync
    const i = Audit.data.violations.findIndex(x => x.id === v.id);
    if (i >= 0) Audit.data.violations[i] = v;
    await Workflow._recomputeAudit();
    Sync.enqueue(Workflow.ctx.auditId);
  },
  async _recomputeAudit() {
    // Recompute stored audit score, excluding upheld-dispute violations (penalty removed).
    const a = await IDB.get("audits_history", Workflow.ctx.auditId);
    if (!a) return;
    const scores = {};
    for (const deptId of a.deptIds) {
      // Use the audit's frozen checklist snapshot (not live), for immutability
      const cats = (a.checklist && a.checklist[deptId] ? a.checklist[deptId].categories : Audit.data.categories[deptId]) || [];
      const struct = (a.checklist && a.checklist[deptId] ? a.checklist[deptId].checkpoints : Audit.data.checkpoints[deptId]) || [];
      const vios = Audit.data.violations.filter(v => v.deptId === deptId && v.status !== VIO_STATUS.DISPUTE_UPHELD);
      const catScores = Scoring.categoryScores(cats, struct, vios);
      scores[deptId] = { categories: catScores, score: Scoring.deptScore(cats, catScores) };
    }
    a.scores = scores;
    a.finalScore = Scoring.finalScore(Object.fromEntries(a.deptIds.map(d => [d, scores[d].score])));
    await DB.saveAudit(a);
    if (Audit.active && Audit.active.id === a.id) Audit.active = a;
  },

  async submitFix(text) {
    const v = Workflow.ctx.vio;
    if (!text.trim() && !(Workflow.ctx.composerPhotos || []).length) { alert("Добавьте комментарий или фото."); return; }
    v.thread = v.thread || []; v.thread.push(Workflow._entry("fix", text));
    if (v.status === VIO_STATUS.OPEN || v.status === VIO_STATUS.DISPUTE_REJECTED) v.status = VIO_STATUS.FIX_SUBMITTED;
    Workflow.ctx.composerPhotos = []; Workflow.ctx.wfText = "";
    await Workflow._save();
    App.notify((Audit.active || {}).auditorId, "Подано исправление · " + ((Audit.active || {}).restaurant || "аудит"), { type: "vio", auditId: Workflow.ctx.auditId, vioId: v.id });
    App.render();
  },
  async resolve() {
    const v = Workflow.ctx.vio;
    v.thread = v.thread || []; v.thread.push({ author: THREAD_AUTHOR.SYSTEM, name: App.user.name, kind: "decision", text: "Исправление принято", photos: [], ts: new Date().toISOString() });
    v.status = VIO_STATUS.RESOLVED;
    await Workflow._save(); App.render();
  },
  async rejectFix() {
    const v = Workflow.ctx.vio;
    v.thread = v.thread || []; v.thread.push({ author: THREAD_AUTHOR.SYSTEM, name: App.user.name, kind: "decision", text: "Исправление отклонено — доработать", photos: [], ts: new Date().toISOString() });
    v.status = VIO_STATUS.OPEN;
    await Workflow._save(); App.render();
  },
  async setScore() {
    const v = Workflow.ctx.vio;
    const val = prompt("Оценка нарушения — штраф в % (0–100). 100% обнуляет категорию:", v.penaltyPercent || 0);
    if (val === null) return;
    const p = Math.max(0, Math.min(100, Number(val) || 0));
    v.penaltyPercent = p; v.pendingScore = false; v.penaltyId = null;
    v.thread = v.thread || []; v.thread.push({ author: THREAD_AUTHOR.SYSTEM, name: App.user.name, kind: "decision", text: "Установлена оценка: −" + p + "%", photos: [], ts: new Date().toISOString() });
    await Workflow._save(); App.log("Ручная оценка нарушения", "−" + p + "%"); App.render();
  },
  async raiseDispute(text) {
    if (!text.trim()) { alert("Опишите причину оспаривания."); return; }
    const v = Workflow.ctx.vio;
    v.thread = v.thread || []; v.thread.push(Workflow._entry("dispute", text));
    v.dispute = { raisedBy: App.user.id, raisedByName: App.user.name, reason: text, ts: new Date().toISOString(), votes: [] };
    v.status = VIO_STATUS.DISPUTED;
    Workflow.ctx.composerPhotos = []; Workflow.ctx.wfText = "";
    await Workflow._save();
    // notify approvers (policy list, else all dispute.approve holders)
    const pol = Workflow.getPolicy(Audit.active);
    const approverIds = pol ? pol.approvers.map(a => a.userId) : App.users.filter(u => { const p = App.effectivePerms(u); return p.has("*") || p.has("dispute.approve"); }).map(u => u.id);
    for (const uid of approverIds) App.notify(uid, "Оспаривание требует согласования · " + ((Audit.active || {}).restaurant || ""), { type: "vio", auditId: Workflow.ctx.auditId, vioId: v.id });
    App.render();
  },
  async voteDispute(approve, comment) {
    const v = Workflow.ctx.vio;
    v.dispute = v.dispute || { votes: [] };
    if (v.dispute.votes.some(x => x.userId === App.user.id)) { alert("Вы уже проголосовали."); return; }
    v.dispute.votes.push({ userId: App.user.id, name: App.user.name, approve, comment: comment || "", ts: new Date().toISOString() });
    v.thread = v.thread || []; v.thread.push({ author: THREAD_AUTHOR.SYSTEM, name: App.user.name, kind: "decision",
      text: (approve ? "Согласовал(а) оспаривание" : "Отклонил(а) оспаривание") + (comment ? ": " + comment : ""), photos: [], ts: new Date().toISOString() });
    // Evaluate against the applicable policy (weighted / unanimous / threshold / override)
    const decision = Workflow.evaluate(v.dispute, Workflow.getPolicy(Audit.active));
    if (decision === "upheld") { v.status = VIO_STATUS.DISPUTE_UPHELD; v.thread.push({ author: THREAD_AUTHOR.SYSTEM, kind: "decision", name: "Система", text: "Оспаривание удовлетворено — нарушение снято, балл восстановлен.", photos: [], ts: new Date().toISOString() }); }
    else if (decision === "rejected") { v.status = VIO_STATUS.DISPUTE_REJECTED; v.thread.push({ author: THREAD_AUTHOR.SYSTEM, kind: "decision", name: "Система", text: "Оспаривание отклонено — нарушение остаётся в силе.", photos: [], ts: new Date().toISOString() }); }
    // else: pending — waits for more approvers
    await Workflow._save(); App.render();
  }
};

  _onChange(e) {
    const el = e.target; const d = el.dataset || {};
    if (el.id === "photoInput") { App.handlePhotos(el.files); return; }
    if (el.id === "uPhotoInput") { App.admUserPhoto(el.files); return; }
    if (el.id === "wfPhotoInput") { App.handleWfPhotos(el.files); return; }
    if (el.id === "backupInput") { App.backupImport(el.files[0]); return; }
    if (d.field === "sched-days") { App.schedSet(el.dataset.id, el.value); return; }
    if (d.field === "setup-restaurant") { App.setup.restaurantId = el.value; return; }
    if (d.field === "rest-concept") { App.setRestaurantConcept(el.dataset.id, el.value).then(() => App.render()); return; }
    if (d.field && d.field.indexOf("hf-") === 0) {
      const map = { "hf-from": "from", "hf-to": "to", "hf-auditor": "auditorId", "hf-restaurant": "restaurantId", "hf-dept": "deptId", "hf-assignee": "assignee" };
      App.histFilter[map[d.field]] = el.value; App.applyHistFilter(true); return;
    }
    if (d.field && d.field.indexOf("tf-") === 0) {
      const map = { "tf-restaurant": "restaurant", "tf-dept": "dept", "tf-assignee": "assignee", "tf-status": "status" };
      if (d.field === "tf-overdue") App.taskFilter.overdue = el.checked; else App.taskFilter[map[d.field]] = el.value;
      App.render(); return;
    }
    if (d.field === "penalty")  { VForm.setPenalty(el.value); App.render(); return; }
    if (d.field === "assignee") { VForm.draft.assigneeRole = el.value; return; }
    if (d.field === "vdeadline") { VForm.draft.deadline = el.value; return; }
    if (d.field === "u-role") {
      const set = new Set(App.adm.uDraft.roleIds || []);
      el.checked ? set.add(el.value) : set.delete(el.value);
      App.adm.uDraft.roleIds = Array.from(set); return;

    if (d.field === "share-user") { App.toggleShareUser(el.value, el.checked); return; }
    if (d.field === "ack-user") { App.ackPick = el.value; return; }
    if (d.field === "u-positionId") {
      const p = App._positions.find(x => x.id === el.value);
      App.adm.uDraft.positionId = el.value || null;
      App.adm.uDraft.position = p ? p.title : "";

    if (d.field === "u-perm") { App.toggleUserPerm(el.value, el.checked); return; }
    if (d.field === "u-scope") {
      const set = new Set(App.adm.uDraft.scope || []);
      el.checked ? set.add(el.value) : set.delete(el.value);
      App.adm.uDraft.scope = Array.from(set); return;
    }

      const set = new Set(App.adm.uDraft.conceptIds || []);
      el.checked ? set.add(el.value) : set.delete(el.value);
      App.adm.uDraft.conceptIds = Array.from(set); return;

      const set = new Set(App.adm.uDraft.deptIds || []);

      App.adm.uDraft.deptIds = Array.from(set); return;

      el.checked ? set.add(el.value) : set.delete(el.value);
      App.adm.posDraft.roleIds = Array.from(set); return;

  hist: { audits: [], top: [], trend: [], total: 0 },
  histRaw: { audits: [], vios: [], cpMap: {} },
  histFilter: { from: "", to: "", auditorId: "", restaurantId: "", deptId: "", assignee: "" },

  async openHistory() {
    let audits = (await DB.audits())
      .filter(a => a.status === AUDIT_STATUS.COMPLETED || a.status === AUDIT_STATUS.ABORTED)
      .sort((a, b) => (a.startedAt < b.startedAt ? 1 : -1));
    audits = App.visibleAudits(audits); // viewAll / scope-subtree+own / own+shared
    const idset = new Set(audits.map(a => a.id));
    const allVios = (await IDB.getAll("audit_violations")).filter(v => idset.has(v.auditId));
    const cpMap = {}; (await IDB.getAll("checklist_structure")).forEach(c => cpMap[c.id] = c);
    App.histRaw = { audits, vios: allVios, cpMap };
    App.histFilter = { from: "", to: "", auditorId: "", restaurantId: "", deptId: "", assignee: "" };
    App.applyHistFilter(false);
    App.route("history");
  },

  filteredHistory() {
    const f = App.histFilter;
    const fromT = f.from ? new Date(f.from + "T00:00:00").getTime() : -Infinity;
    const toT   = f.to ? new Date(f.to + "T23:59:59").getTime() : Infinity;
    let audits = App.histRaw.audits.filter(a => {
      const t = new Date(a.startedAt).getTime();
      if (t < fromT || t > toT) return false;
      if (f.auditorId && a.auditorId !== f.auditorId) return false;
      if (f.restaurantId && a.restaurantId !== f.restaurantId) return false;
      if (f.deptId && !(a.deptIds || []).includes(f.deptId)) return false;
      return true;
    });
    let vios = App.histRaw.vios;
    if (f.deptId) vios = vios.filter(v => v.deptId === f.deptId);
    if (f.assignee) {
      vios = vios.filter(v => v.assigneeRole === f.assignee);
      const withAssignee = new Set(vios.map(v => v.auditId));
      audits = audits.filter(a => withAssignee.has(a.id));
    }
    const auditIds = new Set(audits.map(a => a.id));
    vios = vios.filter(v => auditIds.has(v.auditId));
    return { audits, vios };
  },
  applyHistFilter(rerender) {
    const { audits, vios } = App.filteredHistory();
    const cpMap = App.histRaw.cpMap;
    const counts = {};
    vios.forEach(v => { const o = (cpMap[v.checkpointId] || {}).object || "—"; counts[o] = (counts[o] || 0) + 1; });
    const top = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([name, count]) => ({ name, count }));
    const completed = audits.filter(a => a.status === AUDIT_STATUS.COMPLETED);
    const trend = completed.slice(0, 12).reverse()
      .map(a => ({ date: new Date(a.startedAt).toLocaleDateString("ru-RU", { day: "2-digit", month: "2-digit" }), score: Math.round(a.finalScore == null ? 100 : a.finalScore) }));
    const avg = completed.length ? Math.round(completed.reduce((s, a) => s + (a.finalScore == null ? 100 : a.finalScore), 0) / completed.length) : null;
    App.hist = { audits, top, trend, total: vios.length, avg, vios };
    if (rerender) App.render();
  },
  histActiveFilters() {
    const f = App.histFilter;
    return [f.from, f.to, f.auditorId, f.restaurantId, f.deptId, f.assignee].filter(Boolean).length;
  },
  resetHistFilter() { App.histFilter = { from: "", to: "", auditorId: "", restaurantId: "", deptId: "", assignee: "" }; App.applyHistFilter(true); },

  // Multi-axis scope check: concept + geo(subtree) + department. Empty axis = no restriction.
  conceptOfRestaurant(restId) { const r = App._geo.find(n => n.id === restId); return r ? (r.conceptId || null) : null; },
  inScope(audit) {
    const u = App.user || {};
    const concepts = u.conceptIds || [], geo = u.scope || [], depts = u.deptIds || [];
    if (concepts.length) { const cid = App.conceptOfRestaurant(audit.restaurantId); if (!cid || !concepts.includes(cid)) return false; }
    if (geo.length) { const allowed = Geo.restaurantsUnder(App._geo, geo); if (!(audit.restaurantId && allowed.has(audit.restaurantId))) return false; }
    if (depts.length) { if (!(audit.deptIds || []).some(x => depts.includes(x))) return false; }
    return true;
  },
  // Restaurants the current user may see/audit (concept + geo axes). Empty scope = all.
  myRestaurants() {
    let rests = App._geo.filter(n => n.type === "restaurant");
    const u = App.user || {};
    if ((u.conceptIds || []).length) rests = rests.filter(r => (u.conceptIds).includes(r.conceptId));
    if ((u.scope || []).length) { const allowed = Geo.restaurantsUnder(App._geo, u.scope); rests = rests.filter(r => allowed.has(r.id)); }
    return rests;
  },
  _sharedWith(a) { return (App._access || []).some(g => g.auditId === a.id && g.userId === App.user.id); },
  // Shared scope filter used by History + Dashboard
  visibleAudits(audits) {
    const perms = App.myPerms();
    if (perms.has("*") || perms.has("audit.viewAll")) return audits;
    if (perms.has("audit.viewScope")) {
      return audits.filter(a => a.auditorId === App.user.id || App.inScope(a) || App._sharedWith(a));
    }
    return audits.filter(a => a.auditorId === App.user.id || App._sharedWith(a));
  },

  dash: { avg: null, count: 0, resolveQueue: [], voteQueue: [], attention: [], recent: [] },
  async openDashboard() {
    let audits = (await DB.audits()).filter(a => a.status === AUDIT_STATUS.COMPLETED);
    audits = App.visibleAudits(audits).sort((a, b) => (a.startedAt < b.startedAt ? 1 : -1));
    const byId = {}; audits.forEach(a => byId[a.id] = a);
    const idset = new Set(audits.map(a => a.id));
    const vios = (await IDB.getAll("audit_violations")).filter(v => idset.has(v.auditId));
    const cpMap = {}; (await IDB.getAll("checklist_structure")).forEach(c => cpMap[c.id] = c);
    const resolveQueue = [], voteQueue = [];
    vios.forEach(v => {
      const a = byId[v.auditId]; if (!a) return;
      if (v.status === VIO_STATUS.FIX_SUBMITTED && Workflow.canResolve(a)) resolveQueue.push({ v, a, cp: cpMap[v.checkpointId] || {} });
      if (v.status === VIO_STATUS.DISPUTED && Workflow.isApprover(a) && !((v.dispute && v.dispute.votes) || []).some(x => x.userId === App.user.id)) voteQueue.push({ v, a, cp: cpMap[v.checkpointId] || {} });
    });
    const counts = {};
    vios.filter(v => v.status !== VIO_STATUS.DISPUTE_UPHELD).forEach(v => { const o = (cpMap[v.checkpointId] || {}).object || "—"; counts[o] = (counts[o] || 0) + 1; });
    const attention = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 3).map(([name, count]) => ({ name, count }));
    const avg = audits.length ? Math.round(audits.reduce((s, a) => s + (a.finalScore == null ? 100 : a.finalScore), 0) / audits.length) : null;
    App.dash = { avg, count: audits.length, resolveQueue, voteQueue, attention, recent: audits.slice(0, 5) };

  /* ---- Tasks (corrective actions with deadlines / overdue / repeat) ---- */
  taskRaw: [],
  taskFilter: { restaurant: "", dept: "", assignee: "", status: "", overdue: false },
  OPEN_STATES: ["open", "fix_submitted", "dispute_rejected"],
  _objectOf(v, audit, cpMap) {
    if (audit && audit.checklist && audit.checklist[v.deptId]) {
      const c = (audit.checklist[v.deptId].checkpoints || []).find(x => x.id === v.checkpointId);
      if (c) return c.object;
    }
    return (cpMap[v.checkpointId] || {}).object || "—";
  },
  async openTasks() {
    let audits = (await DB.audits()).filter(a => a.status === AUDIT_STATUS.COMPLETED);
    audits = App.visibleAudits(audits);
    const byId = {}; audits.forEach(a => byId[a.id] = a);
    const idset = new Set(audits.map(a => a.id));
    const allVios = (await IDB.getAll("audit_violations")).filter(v => idset.has(v.auditId));
    const cpMap = {}; (await IDB.getAll("checklist_structure")).forEach(c => cpMap[c.id] = c);
    // repeat occurrences: same restaurant + object across audits
    const occ = {};
    allVios.forEach(v => { const a = byId[v.auditId]; const key = (a.restaurantId || "") + "|" + App._objectOf(v, a, cpMap); (occ[key] = occ[key] || new Set()).add(v.auditId); });
    App.taskRaw = allVios.filter(v => App.OPEN_STATES.includes(v.status || "open")).map(v => {
      const a = byId[v.auditId]; const obj = App._objectOf(v, a, cpMap);
      return { v, a, object: obj, repeat: (occ[(a.restaurantId || "") + "|" + obj] || new Set()).size };
    });
    App.taskFilter = { restaurant: "", dept: "", assignee: "", status: "", overdue: false };
    App.route("tasks");
  },
  _isOverdue(v) { return v.deadline && new Date(v.deadline + "T23:59:59").getTime() < Date.now(); },
  filteredTasks() {
    const f = App.taskFilter;
    return App.taskRaw.filter(t => {
      if (f.restaurant && t.a.restaurantId !== f.restaurant) return false;
      if (f.dept && t.v.deptId !== f.dept) return false;
      if (f.assignee && t.v.assigneeRole !== f.assignee) return false;
      if (f.status && (t.v.status || "open") !== f.status) return false;
      if (f.overdue && !App._isOverdue(t.v)) return false;
      return true;
    });
  },
  taskActiveFilters() { const f = App.taskFilter; return [f.restaurant, f.dept, f.assignee, f.status, f.overdue].filter(Boolean).length; },

  // Backup: full JSON export / import
  async backupExport() {
    const dump = { _meta: { app: "TanukiAudit", ts: new Date().toISOString(), dbVersion: APP_CONFIG.db.version } };
    for (const name of Object.keys(DB_SCHEMA)) { try { dump[name] = await IDB.getAll(name); } catch (e) { dump[name] = []; } }
    Reports._download("tanuki_backup_" + new Date().toISOString().slice(0, 10) + ".json", new Blob([JSON.stringify(dump)], { type: "application/json" }));
    App.log("Резервная копия скачана");
    localStorage.setItem("tanuki_lastBackup", Date.now().toString());
  },
  async backupImport(file) {
    if (!file) return;
    if (!confirm("Восстановить из копии? Текущие данные будут ЗАМЕНЕНЫ.")) return;
    try {
      const dump = JSON.parse(await file.text());
      for (const name of Object.keys(DB_SCHEMA)) {
        if (!Array.isArray(dump[name])) continue;
        const os = IDB._db.transaction(name, "readwrite").objectStore(name);
        await new Promise((res) => { const r = os.clear(); r.onsuccess = res; r.onerror = res; });
        await IDB.bulkPut(name, dump[name]);
      }
      alert("Восстановлено. Приложение перезагрузится."); location.reload();
    } catch (e) { alert("Не удалось прочитать файл копии."); }
  },
  // Auto daily internal snapshot timestamp (real file backup stays manual)
  async autoBackupCheck() {
    const last = Number(localStorage.getItem("tanuki_lastAutoBackup") || 0);
    if (Date.now() - last < 24 * 3600 * 1000) return;
    localStorage.setItem("tanuki_lastAutoBackup", Date.now().toString());
    // push everything to Sheets queue is heavy; here we just log. Manual export = the real backup.
    App.log("Авто-отметка резервного копирования (ежедневно)");
  },

    App._lastAudit = {};
    audits.forEach(a => { if (!a.restaurantId) return; const t = new Date(a.startedAt).getTime(); if (!App._lastAudit[a.restaurantId] || t > App._lastAudit[a.restaurantId]) App._lastAudit[a.restaurantId] = t; });
    App.route("schedule");

  async schedSet(restaurantId, everyDays) {
    everyDays = Math.max(0, Number(everyDays) || 0);
    const ex = (App._schedules || []).find(s => s.restaurantId === restaurantId);
    if (everyDays === 0) { if (ex) await DB.delSchedule(ex.id); }
    else await DB.saveSchedule({ id: ex ? ex.id : "sch_" + restaurantId, restaurantId, everyDays });
    App._schedules = await DB.schedules(); App.render();

  schedOverdue(restaurantId) {
    const s = (App._schedules || []).find(x => x.restaurantId === restaurantId); if (!s) return null;
    const last = App._lastAudit[restaurantId];
    const dueTs = (last || 0) + s.everyDays * 86400000;
    return { everyDays: s.everyDays, last, overdue: Date.now() > dueTs, dueTs };
  },

  // Universal search
  searchQuery: "",
  openSearch() { App.searchQuery = ""; App.route("search"); },
  async doSearch(q) {
    q = (q || "").trim().toLowerCase();
    const res = { audits: [], violations: [], users: [], places: [], depts: [] };
    if (q.length < 2) { App._search = res; return; }
    let audits = (await DB.audits());
    audits = App.visibleAudits(audits);
    const byId = {}; audits.forEach(a => byId[a.id] = a);
    res.audits = audits.filter(a => (a.restaurant || "").toLowerCase().includes(q) || (a.auditorName || "").toLowerCase().includes(q)).slice(0, 20);
    const cpMap = {}; (await IDB.getAll("checklist_structure")).forEach(c => cpMap[c.id] = c);
    const idset = new Set(audits.map(a => a.id));
    res.violations = (await IDB.getAll("audit_violations")).filter(v => idset.has(v.auditId) && ((v.comment || "").toLowerCase().includes(q) || App._objectOf(v, byId[v.auditId], cpMap).toLowerCase().includes(q)))
      .slice(0, 20).map(v => ({ v, a: byId[v.auditId], object: App._objectOf(v, byId[v.auditId], cpMap) }));
    if (App.isAdmin()) res.users = App.users.filter(u => (u.name || "").toLowerCase().includes(q) || (u.login || "").toLowerCase().includes(q) || (u.position || "").toLowerCase().includes(q)).slice(0, 20);
    res.places = App._geo.filter(n => (n.name || "").toLowerCase().includes(q)).slice(0, 20);
    res.depts = App._departments.filter(dp => (dp.name || "").toLowerCase().includes(q)).slice(0, 20);
    App._search = res;
  },

  shr: { auditId: null, granted: [] },
  openShare(auditId) {
    const granted = (App._access || []).filter(g => g.auditId === auditId).map(g => g.userId);
    App.shr = { auditId, granted };
    App.route("share");
  },
  toggleShareUser(uid, on) {
    const set = new Set(App.shr.granted);
    on ? set.add(uid) : set.delete(uid);
    App.shr.granted = Array.from(set);
  },
  async saveShare() {
    const { auditId, granted } = App.shr;
    const existing = (App._access || []).filter(g => g.auditId === auditId);
    const grantedSet = new Set(granted);
    // remove revoked
    for (const g of existing) if (!grantedSet.has(g.userId)) await DB.delAccess(g.id);

  rolePerms(u) {

        <div class="w-12 h-12 mx-auto grid place-items-center rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-400 mb-4">${UI.icon("wrench", "w-6 h-6")}</div>
