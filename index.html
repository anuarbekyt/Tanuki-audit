<script id="app-core">
"use strict";

/* ===================== IndexedDB thin wrapper ===================== */
const IDB = {
  _db: null,
  open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(APP_CONFIG.db.name, APP_CONFIG.db.version);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        Object.keys(DB_SCHEMA).forEach((name) => {
          if (db.objectStoreNames.contains(name)) return;
          const cfg = DB_SCHEMA[name];
          const store = db.createObjectStore(name, { keyPath: cfg.keyPath });
          (cfg.indexes || []).forEach((ix) =>
            store.createIndex(ix.name, ix.keyPath, { unique: !!ix.unique }));
        });
      };
      req.onsuccess = (e) => { this._db = e.target.result; resolve(this._db); };
      req.onerror = (e) => reject(e.target.error);
    });
  },
  _tx(store, mode) { return this._db.transaction(store, mode).objectStore(store); },
  getAll(store) {
    return new Promise((res, rej) => {
      const r = this._tx(store, "readonly").getAll();
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  },
  get(store, key) {
    return new Promise((res, rej) => {
      const r = this._tx(store, "readonly").get(key);
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  },
  put(store, val) {
    return new Promise((res, rej) => {
      const r = this._tx(store, "readwrite").put(val);
      r.onsuccess = () => res(val); r.onerror = () => rej(r.error);
    });
  },
  bulkPut(store, arr) {
    return new Promise((res, rej) => {
      const os = this._tx(store, "readwrite"); let i = 0;
      if (!arr.length) return res(0);
      arr.forEach((v) => { const r = os.put(v); r.onsuccess = () => { if (++i === arr.length) res(i); }; r.onerror = () => rej(r.error); });
    });
  },
  del(store, key) {
    return new Promise((res, rej) => {
      const r = this._tx(store, "readwrite").delete(key);
      r.onsuccess = () => res(true); r.onerror = () => rej(r.error);
    });
  },
  count(store) {
    return new Promise((res, rej) => {
      const r = this._tx(store, "readonly").count();
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  },
  byIndex(store, index, value) {
    return new Promise((res, rej) => {
      const r = this._tx(store, "readonly").index(index).getAll(value);
      r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
    });
  }
};

/* ===================== Data access + first-launch seed ===================== */
const DB = {
  async init() { await IDB.open(); await this.seedIfEmpty(); await this.ensureSeed(); },

  // Fills data that may be missing on already-seeded (upgraded) databases.
  async ensureSeed() {
    if (await IDB.count("roles") === 0) await IDB.bulkPut("roles", SEED.roles);
    const users = await IDB.getAll("users_roles");
    for (const su of SEED.users_roles) {
      const ex = users.find(u => u.id === su.id);
      if (!ex) await IDB.put("users_roles", su);
      else if (!ex.login) await IDB.put("users_roles", Object.assign(ex, { login: su.login, position: su.position, roleIds: su.roleIds, scope: su.scope || [] }));
    }
  },

  async seedIfEmpty() {
    if (await IDB.count("departments") > 0) return;
    await IDB.bulkPut("users_roles", SEED.users_roles);
    await IDB.bulkPut("roles", SEED.roles);
    await IDB.bulkPut("departments", SEED.departments);
    await IDB.bulkPut("penalties", SEED.penalties);
    await IDB.bulkPut("orgRoles", SEED.orgRoles);

    // Flatten BAR checklist -> categories + checkpoints
    const cats = [], checks = [];
    SEED.bar_checklist.forEach((c) => {
      cats.push({ id: c.id, deptId: "dept_bar", code: c.code, name: c.name, weight: c.weight });
      c.checkpoints.forEach((cp) =>
        checks.push({ id: cp.id, deptId: "dept_bar", categoryId: c.id,
          index: cp.index, object: cp.object, criterion: cp.criterion, requirement: cp.requirement }));
    });
    await IDB.bulkPut("checklist_categories", cats);
    await IDB.bulkPut("checklist_structure", checks);
  },

  users()       { return IDB.getAll("users_roles"); },
  saveUser(u)   { return IDB.put("users_roles", u); },
  delUser(id)   { return IDB.del("users_roles", id); },
  roles()       { return IDB.getAll("roles"); },
  saveRole(r)   { return IDB.put("roles", r); },
  delRole(id)   { return IDB.del("roles", id); },
  geoNodes()    { return IDB.getAll("geo_nodes"); },
  saveGeo(n)    { return IDB.put("geo_nodes", n); },
  delGeo(id)    { return IDB.del("geo_nodes", id); },
  positions()   { return IDB.getAll("positions"); },
  savePosition(p) { return IDB.put("positions", p); },
  delPosition(id) { return IDB.del("positions", id); },
  policies()    { return IDB.getAll("dispute_policies"); },
  savePolicy(p) { return IDB.put("dispute_policies", p); },
  delPolicy(id) { return IDB.del("dispute_policies", id); },
  access()      { return IDB.getAll("report_access"); },
  saveAccess(g) { return IDB.put("report_access", g); },
  delAccess(id) { return IDB.del("report_access", id); },
  concepts()    { return IDB.getAll("concepts").then(c => c.sort((a, b) => (a.order || 0) - (b.order || 0))); },
  saveConcept(c){ return IDB.put("concepts", c); },
  delConcept(id){ return IDB.del("concepts", id); },
  saveDept(d)   { return IDB.put("departments", d); },
  delDept(id)   { return IDB.del("departments", id); },
  saveCategory(c) { return IDB.put("checklist_categories", c); },
  delCategory(id) { return IDB.del("checklist_categories", id); },
  saveCheckpoint(c) { return IDB.put("checklist_structure", c); },
  delCheckpoint(id) { return IDB.del("checklist_structure", id); },
  logVersion(v) { return IDB.put("checklist_versions", v); },
  versions(deptId) { return IDB.byIndex("checklist_versions", "deptId", deptId); },
  logAction(l)  { return IDB.put("audit_log", l); },
  auditLog()    { return IDB.getAll("audit_log"); },
  notifyPut(n)  { return IDB.put("notifications", n); },
  notifications(userId) { return IDB.byIndex("notifications", "userId", userId); },
  schedules()   { return IDB.getAll("schedules"); },
  saveSchedule(s) { return IDB.put("schedules", s); },
  delSchedule(id) { return IDB.del("schedules", id); },
  departments() { return IDB.getAll("departments").then(d => d.sort((a,b)=>a.order-b.order)); },
  penalties()   { return IDB.getAll("penalties").then(p => p.sort((a, b) => a.percent - b.percent)); },
  orgRoles()    { return IDB.getAll("orgRoles").then(r => r.sort((a,b)=>a.order-b.order)); },
  categories(deptId) { return IDB.byIndex("checklist_categories", "deptId", deptId); },
  checkpoints(deptId) { return IDB.byIndex("checklist_structure", "deptId", deptId); },
  audits()      { return IDB.getAll("audits_history"); },
  saveAudit(a)  { return IDB.put("audits_history", a); },
  saveViolation(v) { return IDB.put("audit_violations", v); },
  violations(auditId) { return IDB.byIndex("audit_violations", "auditId", auditId); }
};

/* ===================== Session (localStorage) ===================== */
const Session = {
  KEY: "tanuki_session",
  data: { userId: null, route: "login", theme: "light" },
  load() { try { Object.assign(this.data, JSON.parse(localStorage.getItem(this.KEY) || "{}")); } catch (e) {} return this.data; },
  save() { localStorage.setItem(this.KEY, JSON.stringify(this.data)); },
  set(patch) { Object.assign(this.data, patch); this.save(); },
  clear() { this.data.userId = null; this.data.route = "login"; this.save(); }
};

/* ===================== Scoring engine (percentage model) ===================== */
const Scoring = {
  // categories: [{id,weight}], structure: [{id,categoryId}], violations: [{checkpointId,penaltyPercent}]
  categoryScores(categories, structure, violations) {
    const cpToCat = {}; structure.forEach(s => cpToCat[s.id] = s.categoryId);
    const scores = {}; categories.forEach(c => scores[c.id] = 100);
    violations.forEach(v => {
      const cat = v.categoryId || cpToCat[v.checkpointId];
      if (cat == null || scores[cat] == null) return;
      scores[cat] = Math.max(0, scores[cat] - (Number(v.penaltyPercent) || 0));
    });
    return scores; // {categoryId: percent}
  },
  deptScore(categories, catScores) {
    const totW = categories.reduce((s, c) => s + (Number(c.weight) || 0), 0) || 1;
    const sum = categories.reduce((s, c) => s + catScores[c.id] * (Number(c.weight) || 0), 0);
    return Math.round((sum / totW) * 10) / 10;
  },
  finalScore(deptScores) {
    const vals = Object.values(deptScores);
    if (!vals.length) return 0;
    return Math.round((vals.reduce((a, b) => a + b, 0) / vals.length) * 10) / 10;
  }
};

/* ===================== Theme ===================== */
const Theme = {
  apply() { document.documentElement.classList.toggle("dark", Session.data.theme === "dark"); },
  toggle() { Session.set({ theme: Session.data.theme === "dark" ? "light" : "dark" }); this.apply(); App.render(); }
};

/* ===================== Sync (Google Apps Script) ===================== */
const Sync = {
  online: navigator.onLine,
  async ping() {
    if (!APP_CONFIG.apiUrl) return false;
    try {
      const r = await fetch(APP_CONFIG.apiUrl + "?action=ping", { method: "GET" });
      const j = await r.json(); return !!j.ok;
    } catch (e) { return false; }
  },
  async pull() {
    if (!APP_CONFIG.apiUrl || !navigator.onLine || !IDB._db) return;
    try {
      const r = await fetch(APP_CONFIG.apiUrl + "?action=bootstrap", { method: "GET" });
      const j = await r.json();
      if (j.ok) {
        const configStores = [
          "users_roles", "roles", "geo_nodes", "positions", "departments",
          "checklist_categories", "checklist_structure", "penalties", "orgRoles",
          "concepts", "dispute_policies", "audit_log"
        ];
        for (const store of configStores) {
          if (j[store] && Array.isArray(j[store])) {
            const os = IDB._db.transaction(store, "readwrite").objectStore(store);
            await new Promise(res => { const req = os.clear(); req.onsuccess = res; req.onerror = res; });
            await IDB.bulkPut(store, j[store]);
          }
        }
      }
    } catch (e) { console.warn("Pull failed", e); }
  },
  async pushAudit(audit, violations) {
    if (!APP_CONFIG.apiUrl) throw new Error("apiUrl not set");
    const res = await fetch(APP_CONFIG.apiUrl, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" }, // simple request -> no CORS preflight
      body: JSON.stringify({ type: "audit_sync", audit, violations })
    });
    return res.json();
  },
  // Offline-safe queue: enqueue on finish/abort, flush when online.
  _flushing: false,
  async enqueue(auditId) {
    try { await IDB.put("syncQueue", { qid: "q_" + auditId, auditId, createdAt: Date.now() }); } catch (e) {}
    Sync.flush();
  },
  async dequeue(auditId) { try { await IDB.del("syncQueue", "q_" + auditId); } catch (e) {} },
  async flush() {
    if (Sync._flushing || !APP_CONFIG.apiUrl || !navigator.onLine || !IDB._db) return;
    Sync._flushing = true;
    let progressed = false;
    try {
      const q = await IDB.getAll("syncQueue");
      for (const item of q) {
        const audit = await IDB.get("audits_history", item.auditId);
        if (!audit) { await IDB.del("syncQueue", item.qid); progressed = true; continue; }
        try {
          const vios = await DB.violations(item.auditId);
          const res = await Sync.pushAudit(audit, vios);
          if (res && res.ok) { await IDB.del("syncQueue", item.qid); progressed = true; }
          else break;
        } catch (e) { break; }
      }
      // Sync other tables (admin changes)
      if (App.isAdmin()) {
        const logs = await IDB.getAll("audit_log");
        await fetch(APP_CONFIG.apiUrl, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ type: "admin_sync",
            users: await IDB.getAll("users_roles"),
            roles: await IDB.getAll("roles"),
            geo: await IDB.getAll("geo_nodes"),
            concepts: await IDB.getAll("concepts"),
            depts: await IDB.getAll("departments"),
            logs: logs
          })
        });
      }
    } finally {
      Sync._flushing = false;
      // Only re-drain if we made progress AND items remain (added mid-flush) — avoids hammering on persistent errors.
      if (progressed && navigator.onLine && (await Sync.pendingCount()) > 0) setTimeout(() => Sync.flush(), 1500);
    }
  },
  async pendingCount() { try { return (await IDB.getAll("syncQueue")).length; } catch (e) { return 0; } }
};

/* ===================== Media: client-side image compression ===================== */
const Media = {
  compress(file, maxDim, quality) {
    maxDim = maxDim || 1280; quality = quality || 0.7;
    return new Promise((resolve, reject) => {
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        let { width: w, height: h } = img;
        if (w > h && w > maxDim) { h = Math.round(h * maxDim / w); w = maxDim; }
        else if (h > maxDim) { w = Math.round(w * maxDim / h); h = maxDim; }
        const cv = document.createElement("canvas"); cv.width = w; cv.height = h;
        cv.getContext("2d").drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        resolve(cv.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("image load failed")); };
      img.src = url;
    });
  }
};

/* ===================== Voice: speech-to-text (webkitSpeechRecognition) ===================== */
const Voice = {
  rec: null, active: false,
  supported() { return "webkitSpeechRecognition" in window || "SpeechRecognition" in window; },
  toggle(onResult, onEnd) {
    if (this.active) { this.stop(); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return false;
    const r = new SR();
    r.lang = "ru-RU"; r.interimResults = true; r.continuous = true;
    let finalText = "";
    r.onresult = (e) => {
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) finalText += t + " "; else interim += t;
      }
      onResult(finalText + interim);
    };
    r.onend = () => { this.active = false; if (onEnd) onEnd(finalText.trim()); };
    r.onerror = () => { this.active = false; if (onEnd) onEnd(finalText.trim()); };
    this.rec = r; this.active = true; r.start();
    return true;
  },
  stop() { if (this.rec) { try { this.rec.stop(); } catch (e) {} } this.active = false; }
};

/* ===================== Audit controller ===================== */
const Audit = {
  // Active audit + cached checklist data for the run
  active: null,
  data: { categories: {}, checkpoints: {}, violations: [] },
  ui: { deptId: null, openCat: null },

  deptsWithContent(all) {
    return all.filter(d => (Audit.data.categories[d.id] || []).length > 0);
  },

  async start(scope, deptIds) {
    const now = new Date();
    Audit.active = {
      id: "aud_" + now.getTime(),
      auditorId: App.user.id, auditorName: App.user.name,
      scope: scope, deptIds: deptIds.slice(),
      restaurantId: App.setup.restaurantId || "",
      restaurant: (function () { const r = (App.setup.restaurants || []).find(x => x.id === App.setup.restaurantId); return r ? r.name : ""; })(),
      startedAt: now.toISOString(),
      status: AUDIT_STATUS.IN_PROGRESS,
      finishedAt: null, scores: {}, finalScore: null
    };
    await Audit._loadData(deptIds);
    // Freeze the checklist version into the audit (immutability — old audits keep their structure)
    Audit.active.checklist = {};
    deptIds.forEach(id => { Audit.active.checklist[id] = { categories: Audit.data.categories[id] || [], checkpoints: Audit.data.checkpoints[id] || [] }; });
    Audit.data.violations = [];
    Audit.ui = { deptId: deptIds[0], openCat: null };
    await DB.saveAudit(Audit.active);
    Session.set({ activeAuditId: Audit.active.id });
    App.route("audit_run");
  },

  // Populate Audit.data from the frozen snapshot if present, else load live (legacy audits)
  async _hydrate(a) {
    if (a.checklist) {
      Audit.data.categories = {}; Audit.data.checkpoints = {};
      (a.deptIds || []).forEach(id => { const s = a.checklist[id] || {}; Audit.data.categories[id] = s.categories || []; Audit.data.checkpoints[id] = s.checkpoints || []; });
    } else await Audit._loadData(a.deptIds);
  },

  async resume(id) {
    const a = await IDB.get("audits_history", id);
    if (!a) return;
    Audit.active = a;
    await Audit._hydrate(a);
    Audit.data.violations = await DB.violations(id);
    Audit.ui = { deptId: a.deptIds[0], openCat: null };
    if (a.status === AUDIT_STATUS.PAUSED) { a.status = AUDIT_STATUS.IN_PROGRESS; await DB.saveAudit(a); }
    Session.set({ activeAuditId: id });
    App.route("audit_run");
  },

  async _loadData(deptIds) {
    Audit.data.categories = {}; Audit.data.checkpoints = {};
    for (const id of deptIds) {
      const cats = (await DB.categories(id)).sort((a, b) => Number(a.code) - Number(b.code));
      const chks = (await DB.checkpoints(id)).sort((a, b) => {
        const pa = String(a.index).split(".").map(Number), pb = String(b.index).split(".").map(Number);
        return (pa[0] - pb[0]) || ((pa[1] || 0) - (pb[1] || 0));
      });
      Audit.data.categories[id] = cats;
      Audit.data.checkpoints[id] = chks;
    }
  },

  violationsFor(checkpointId) {
    return Audit.data.violations.filter(v => v.checkpointId === checkpointId);
  },

  recompute() {
    const a = Audit.active; const scores = {};
    a.deptIds.forEach(deptId => {
      const cats = Audit.data.categories[deptId] || [];
      const struct = Audit.data.checkpoints[deptId] || [];
      const vios = Audit.data.violations.filter(v => v.deptId === deptId);
      const catScores = Scoring.categoryScores(cats, struct, vios);
      scores[deptId] = { categories: catScores, score: Scoring.deptScore(cats, catScores) };
    });
    a.scores = scores;
    a.finalScore = Scoring.finalScore(Object.fromEntries(a.deptIds.map(d => [d, scores[d].score])));
    return a;
  },

  async persist() { await DB.saveAudit(Audit.recompute()); },

  async addViolation(v) {
    Audit.data.violations.push(v);
    await DB.saveViolation(v);
    await Audit.persist();
  },
  async removeViolation(id) {
    Audit.data.violations = Audit.data.violations.filter(x => x.id !== id);
    await IDB.del("audit_violations", id);
    await Audit.persist();
  },

  async pause()  { Audit.active.status = AUDIT_STATUS.PAUSED; await Audit.persist(); Session.set({ activeAuditId: Audit.active.id }); Audit.active = null; App.route("home"); },
  async finish() { const a = Audit.active; a.status = AUDIT_STATUS.COMPLETED; a.finishedAt = new Date().toISOString(); await Audit.persist(); Sync.enqueue(a.id); Session.set({ activeAuditId: null }); App.route("audit_done"); },
  async abort()  { const a = Audit.active; a.status = AUDIT_STATUS.ABORTED; a.finishedAt = new Date().toISOString(); await Audit.persist(); Sync.enqueue(a.id); Session.set({ activeAuditId: null }); Audit.active = null; App.route("home"); }
};

  _color(p) { return p >= 90 ? "#059669" : p >= 75 ? "#d97706" : "#EA1B24"; },
  _esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); },
  fname(m, ext) { return `Аудит_${m.scope}_${new Date().toISOString().slice(0, 10)}.${ext}`.replace(/\s+/g, "_"); },

  _download(name, blob) { const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 3000); },

  // Export a department's checklist as a standard (Excel with 2 sheets + CSV fallback)

    const depName = (App._departments.find(d => d.id === deptId) || {}).name || deptId;

        depts: [{ name: depName, score: 100, categories: cats.map(c => ({ name: c.name, weight: c.weight, score: 100 })) }],
        violations: [], critical: [], nonCritical: []
      };
      if (format === 'html') return Reports.exportHTML(m);
      return Reports.exportPDF(m);
    }

    const catSheet = [["Категория", "Вес %"]]; cats.forEach(c => catSheet.push([c.name, c.weight]));
    const cpSheet = [["Категория", "Индекс", "Объект", "Критерий", "Требование", "Режим оценки"]];
    checks.forEach(cp => cpSheet.push([catName[cp.categoryId] || "", cp.index || "", cp.object || "", cp.criterion || "", cp.requirement || "", modeTxt(cp)]));
    const wb = window.XLSX.utils.book_new();

      ["Сводный отчёт за период"],

/* ===================== Geo tree helper (Country -> [Region] -> City -> Restaurant) ===================== */
const Geo = {
  TYPES: { country: "Страна", region: "Регион", city: "Город", restaurant: "Ресторан" },
  CHILD: { country: ["region", "city"], region: ["city"], city: ["restaurant"], restaurant: [] },
  children(list, pid) { return list.filter(n => (n.parentId || null) === (pid || null)); },
  descendants(list, id) {
    const out = [];
    const walk = (pid) => Geo.children(list, pid).forEach(c => { out.push(c); walk(c.id); });
    walk(id); return out;
  },
  // Expands scope node ids to the set of restaurant ids inside their subtrees
  restaurantsUnder(list, ids) {
    const set = new Set();
    (ids || []).forEach(id => {
      const n = list.find(x => x.id === id);
      if (!n) return;
      if (n.type === "restaurant") set.add(n.id);
      Geo.descendants(list, id).forEach(d => { if (d.type === "restaurant") set.add(d.id); });
    });
    return set;
  }
};

const VForm = {
  draft: null, penalties: [], orgRoles: [],
  async open(deptId, checkpointId) {

    let penaltyId = null, penaltyPercent = 0, pendingScore = false;
    if (mode === SEVMODE.FIXED) { penaltyPercent = Number(cp.fixedPenalty) || 0; }
    else if (mode === SEVMODE.MANAGER) { pendingScore = true; }
    else { const def = VForm.penalties[0] || { id: null, percent: 0 }; penaltyId = def.id; penaltyPercent = def.percent; }
    VForm.draft = {
      id: "vio_" + Date.now() + "_" + Math.random().toString(36).slice(2, 6),
      auditId: Audit.active.id, deptId, checkpointId, severityMode: mode,
      severity: SEVERITY.NON_CRITICAL, penaltyId, penaltyPercent, pendingScore,

/* ===================== Photo editor (canvas markers) ===================== */
const PhotoEdit = {
  idx: null, tool: "circle", shapes: [], img: null, cv: null, ctx: null, start: null,
  open(idx) { PhotoEdit.idx = idx; PhotoEdit.tool = "circle"; PhotoEdit.shapes = (VForm.draft.markers[idx] || []).slice(); App.route("photo_edit"); },
  init() {
    const cv = document.getElementById("editCanvas"); if (!cv) return;
    const img = new Image();
    img.onload = () => {
      const maxW = cv.parentElement.clientWidth;
      const scale = Math.min(1, maxW / img.width);
      cv.width = Math.round(img.width * scale); cv.height = Math.round(img.height * scale);
      PhotoEdit.img = img; PhotoEdit.cv = cv; PhotoEdit.ctx = cv.getContext("2d"); PhotoEdit.redraw();
    };
    img.src = VForm.draft.photos[PhotoEdit.idx];
    let drawing = false;
    const pos = (e) => { const r = cv.getBoundingClientRect(); const t = e.touches ? e.touches[0] : e; return { x: t.clientX - r.left, y: t.clientY - r.top }; };
    const down = (e) => { e.preventDefault(); drawing = true; PhotoEdit.start = pos(e); };
    const move = (e) => { if (!drawing) return; e.preventDefault(); const p = pos(e); PhotoEdit.redraw(); PhotoEdit._shape(PhotoEdit.start, p); };
    const up = (e) => { if (!drawing) return; drawing = false; const p = pos(e); const s = PhotoEdit.start;
      PhotoEdit.shapes.push({ tool: PhotoEdit.tool, x1: s.x / cv.width, y1: s.y / cv.height, x2: p.x / cv.width, y2: p.y / cv.height });
      PhotoEdit.redraw(); };
    cv.onmousedown = down; cv.onmousemove = move; window.addEventListener("mouseup", up, { once: false });
    cv.ontouchstart = down; cv.ontouchmove = move; cv.ontouchend = up;
    PhotoEdit._up = up;
  },
  redraw() { const p = PhotoEdit; if (!p.ctx) return; p.ctx.drawImage(p.img, 0, 0, p.cv.width, p.cv.height); p.shapes.forEach(s => p._draw(s)); },
  _shape(a, b) { PhotoEdit._draw({ tool: PhotoEdit.tool, x1: a.x / PhotoEdit.cv.width, y1: a.y / PhotoEdit.cv.height, x2: b.x / PhotoEdit.cv.width, y2: b.y / PhotoEdit.cv.height }); },
  _draw(s) {
    const { ctx, cv } = PhotoEdit; if (!ctx) return;
    ctx.strokeStyle = "#EA1B24"; ctx.lineWidth = Math.max(3, cv.width * 0.008); ctx.lineCap = "round"; ctx.lineJoin = "round";
    const x1 = s.x1 * cv.width, y1 = s.y1 * cv.height, x2 = s.x2 * cv.width, y2 = s.y2 * cv.height;
    if (s.tool === "circle") {
      ctx.beginPath(); ctx.ellipse((x1 + x2) / 2, (y1 + y2) / 2, Math.abs(x2 - x1) / 2, Math.abs(y2 - y1) / 2, 0, 0, Math.PI * 2); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      const ang = Math.atan2(y2 - y1, x2 - x1), h = Math.max(12, cv.width * 0.035);
      ctx.beginPath(); ctx.moveTo(x2, y2); ctx.lineTo(x2 - h * Math.cos(ang - 0.4), y2 - h * Math.sin(ang - 0.4));
      ctx.moveTo(x2, y2); ctx.lineTo(x2 - h * Math.cos(ang + 0.4), y2 - h * Math.sin(ang + 0.4)); ctx.stroke();
    }
  },
  undo() { PhotoEdit.shapes.pop(); PhotoEdit.redraw(); },
  save() {
    const img = PhotoEdit.img;
    const full = document.createElement("canvas"); full.width = img.width; full.height = img.height;
    const fx = full.getContext("2d"); fx.drawImage(img, 0, 0);
    const savedCv = PhotoEdit.cv, savedCtx = PhotoEdit.ctx;
    PhotoEdit.cv = full; PhotoEdit.ctx = fx; PhotoEdit.shapes.forEach(s => PhotoEdit._draw(s));
    PhotoEdit.cv = savedCv; PhotoEdit.ctx = savedCtx;
    VForm.draft.photos[PhotoEdit.idx] = full.toDataURL("image/jpeg", 0.7);
    VForm.draft.markers[PhotoEdit.idx] = PhotoEdit.shapes.slice();
    App.route("violation");
  }
};

  meta(s) {

      case VIO_STATUS.FIX_SUBMITTED:   return { label: "На проверке", cls: "bg-amber-50 text-amber-700 dark:bg-amber-500/10 dark:text-amber-400" };
      case VIO_STATUS.RESOLVED:        return { label: "Исправлено", cls: "bg-emerald-50 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-400" };
      case VIO_STATUS.DISPUTED:        return { label: "Оспаривается", cls: "bg-violet-50 text-violet-700 dark:bg-violet-500/10 dark:text-violet-400" };
      case VIO_STATUS.DISPUTE_UPHELD:  return { label: "Оспорено (снято)", cls: "bg-emerald-50 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-400" };
      case VIO_STATUS.DISPUTE_REJECTED:return { label: "Оспаривание отклонено", cls: "bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400" };
      default:                         return { label: "Открыто", cls: "bg-brand/10 text-brand" };
    }
  },
  // Rank via position tree depth (0 = top). No position = lowest (Infinity).
  rankOf(positionId) {
    if (!positionId) return Infinity;
    let d = 0, cur = App._positions.find(p => p.id === positionId);
    const seen = new Set();
    while (cur && cur.parentId && !seen.has(cur.id)) { seen.add(cur.id); cur = App._positions.find(p => p.id === cur.parentId); d++; }
    return cur ? d : Infinity;
  },
  auditorOf(audit) { return App.users.find(u => u.id === audit.auditorId); },
  canResolve(audit) {
    if (!App.can("task.resolve")) return false;
    const aud = Workflow.auditorOf(audit);
    // Rank gate: resolver's rank must be >= auditor's rank (same or higher position).
    return Workflow.rankOf(App.user.positionId) <= Workflow.rankOf(aud ? aud.positionId : null);
  },
  // Applicable dispute policy: per-restaurant, else "default", else null (legacy any-approver)
  getPolicy(audit) {
    const pol = (App._policies || []);
    const byRest = pol.find(p => p.id === (audit.restaurantId || "") && (p.approvers || []).length);
    if (byRest) return byRest;
    const def = pol.find(p => p.id === "default" && (p.approvers || []).length);
    return def || null;
  },
  // Approver of a dispute: in policy's approver list; else legacy (dispute.approve + scope)
  isApprover(audit) {
    if (!App.can("dispute.approve")) return false;
    const pol = Workflow.getPolicy(audit);
    if (pol) return pol.approvers.some(a => a.userId === App.user.id);
    if (!(App.user.scope || []).length) return true;
    if (!audit.restaurantId) return true;
    return Geo.restaurantsUnder(App._geo, App.user.scope).has(audit.restaurantId);
  },
  // Returns "upheld" | "rejected" | "pending"
  evaluate(dispute, pol) {
    const votes = dispute.votes || [];
    if (!votes.length) return "pending";
    if (!pol) { const last = votes[votes.length - 1]; return last.approve ? "upheld" : "rejected"; }
    // Override approver decides unilaterally
    const overrideIds = new Set(pol.approvers.filter(a => a.canOverride).map(a => a.userId));
    const ov = votes.find(v => overrideIds.has(v.userId));
    if (ov) return ov.approve ? "upheld" : "rejected";
    const wOf = (uid) => { const a = pol.approvers.find(x => x.userId === uid); return a ? (Number(a.weight) || 1) : 0; };
    const totalW = pol.approvers.reduce((s, a) => s + (Number(a.weight) || 1), 0) || 1;
    const appW = votes.filter(v => v.approve).reduce((s, v) => s + wOf(v.userId), 0);
    const rejW = votes.filter(v => !v.approve).reduce((s, v) => s + wOf(v.userId), 0);
    if (pol.mode === "unanimous") {
      if (rejW > 0) return "rejected";
      const approvedCount = pol.approvers.filter(a => votes.some(v => v.userId === a.userId && v.approve)).length;
      return approvedCount >= pol.approvers.length ? "upheld" : "pending";
    }
    const need = ((Number(pol.threshold) || 60) / 100) * totalW;
    if (appW >= need) return "upheld";
    if (rejW > totalW - need) return "rejected";
    return "pending";
  },
  policySummary(audit) {
    const pol = Workflow.getPolicy(audit); if (!pol) return "";
    const names = (pol.approvers || []).map(a => { const u = App.users.find(x => x.id === a.userId); return (u ? u.name : "?") + (a.canOverride ? "★" : "") + "×" + (a.weight || 1); }).join(", ");
    const mode = pol.mode === "unanimous" ? "единогласно" : "порог " + (pol.threshold || 60) + "%";
    return mode + " · " + names;
  },

  open(auditId, vioId) {
    const vio = Audit.data.violations.find(v => v.id === vioId);
    if (!vio) return;
    if (!vio.status) vio.status = VIO_STATUS.OPEN;
    Workflow.ctx = { auditId, vio, composerPhotos: [] };
    App.route("vio_detail");
  },

  _entry(kind, text) {
    return { author: (kind === "fix" || kind === "dispute") ? THREAD_AUTHOR.RESTAURANT : THREAD_AUTHOR.AUDITOR,
      name: App.user.name, role: App.user.position || "", kind, text: text || "",
      photos: (Workflow.ctx.composerPhotos || []).slice(), ts: new Date().toISOString() };
  },
  async _save() {
    const v = Workflow.ctx.vio;
    await DB.saveViolation(v);
    // keep in-memory audit data in sync
    const i = Audit.data.violations.findIndex(x => x.id === v.id);
    if (i >= 0) Audit.data.violations[i] = v;
    await Workflow._recomputeAudit();
    Sync.enqueue(Workflow.ctx.auditId);
  },
  async _recomputeAudit() {
    // Recompute stored audit score, excluding upheld-dispute violations (penalty removed).
    const a = await IDB.get("audits_history", Workflow.ctx.auditId);
    if (!a) return;
    const scores = {};
    for (const deptId of a.deptIds) {
      // Use the audit's frozen checklist snapshot (not live), for immutability
      const cats = (a.checklist && a.checklist[deptId] ? a.checklist[deptId].categories : Audit.data.categories[deptId]) || [];
      const struct = (a.checklist && a.checklist[deptId] ? a.checklist[deptId].checkpoints : Audit.data.checkpoints[deptId]) || [];
      const vios = Audit.data.violations.filter(v => v.deptId === deptId && v.status !== VIO_STATUS.DISPUTE_UPHELD);
      const catScores = Scoring.categoryScores(cats, struct, vios);
      scores[deptId] = { categories: catScores, score: Scoring.deptScore(cats, catScores) };
    }
    a.scores = scores;
    a.finalScore = Scoring.finalScore(Object.fromEntries(a.deptIds.map(d => [d, scores[d].score])));
    await DB.saveAudit(a);
    if (Audit.active && Audit.active.id === a.id) Audit.active = a;
  },

  async submitFix(text) {
    const v = Workflow.ctx.vio;
    if (!text.trim() && !(Workflow.ctx.composerPhotos || []).length) { alert("Добавьте комментарий или фото."); return; }
    v.thread = v.thread || []; v.thread.push(Workflow._entry("fix", text));
    if (v.status === VIO_STATUS.OPEN || v.status === VIO_STATUS.DISPUTE_REJECTED) v.status = VIO_STATUS.FIX_SUBMITTED;
    Workflow.ctx.composerPhotos = []; Workflow.ctx.wfText = "";
    await Workflow._save();
    App.notify((Audit.active || {}).auditorId, "Подано исправление · " + ((Audit.active || {}).restaurant || "аудит"), { type: "vio", auditId: Workflow.ctx.auditId, vioId: v.id });
    App.render();
  },
  async resolve() {
    const v = Workflow.ctx.vio;
    v.thread = v.thread || []; v.thread.push({ author: THREAD_AUTHOR.SYSTEM, name: App.user.name, kind: "decision", text: "Исправление принято", photos: [], ts: new Date().toISOString() });
    v.status = VIO_STATUS.RESOLVED;
    await Workflow._save(); App.render();
  },
  async rejectFix() {
    const v = Workflow.ctx.vio;
    v.thread = v.thread || []; v.thread.push({ author: THREAD_AUTHOR.SYSTEM, name: App.user.name, kind: "decision", text: "Исправление отклонено — доработать", photos: [], ts: new Date().toISOString() });
    v.status = VIO_STATUS.OPEN;
    await Workflow._save(); App.render();
  },
  async setScore() {
    const v = Workflow.ctx.vio;
    const val = prompt("Оценка нарушения — штраф в % (0–100). 100% обнуляет категорию:", v.penaltyPercent || 0);
    if (val === null) return;
    const p = Math.max(0, Math.min(100, Number(val) || 0));
    v.penaltyPercent = p; v.pendingScore = false; v.penaltyId = null;
    v.thread = v.thread || []; v.thread.push({ author: THREAD_AUTHOR.SYSTEM, name: App.user.name, kind: "decision", text: "Установлена оценка: −" + p + "%", photos: [], ts: new Date().toISOString() });
    await Workflow._save(); App.log("Ручная оценка нарушения", "−" + p + "%"); App.render();
  },
  async raiseDispute(text) {
    if (!text.trim()) { alert("Опишите причину оспаривания."); return; }
    const v = Workflow.ctx.vio;
    v.thread = v.thread || []; v.thread.push(Workflow._entry("dispute", text));
    v.dispute = { raisedBy: App.user.id, raisedByName: App.user.name, reason: text, ts: new Date().toISOString(), votes: [] };
    v.status = VIO_STATUS.DISPUTED;
    Workflow.ctx.composerPhotos = []; Workflow.ctx.wfText = "";
    await Workflow._save();
    // notify approvers (policy list, else all dispute.approve holders)
    const pol = Workflow.getPolicy(Audit.active);
    const approverIds = pol ? pol.approvers.map(a => a.userId) : App.users.filter(u => { const p = App.effectivePerms(u); return p.has("*") || p.has("dispute.approve"); }).map(u => u.id);
    for (const uid of approverIds) App.notify(uid, "Оспаривание требует согласования · " + ((Audit.active || {}).restaurant || ""), { type: "vio", auditId: Workflow.ctx.auditId, vioId: v.id });
    App.render();
  },
  async voteDispute(approve, comment) {
    const v = Workflow.ctx.vio;
    v.dispute = v.dispute || { votes: [] };
    if (v.dispute.votes.some(x => x.userId === App.user.id)) { alert("Вы уже проголосовали."); return; }
    v.dispute.votes.push({ userId: App.user.id, name: App.user.name, approve, comment: comment || "", ts: new Date().toISOString() });
    v.thread = v.thread || []; v.thread.push({ author: THREAD_AUTHOR.SYSTEM, name: App.user.name, kind: "decision",
      text: (approve ? "Согласовал(а) оспаривание" : "Отклонил(а) оспаривание") + (comment ? ": " + comment : ""), photos: [], ts: new Date().toISOString() });
    // Evaluate against the applicable policy (weighted / unanimous / threshold / override)
    const decision = Workflow.evaluate(v.dispute, Workflow.getPolicy(Audit.active));
    if (decision === "upheld") { v.status = VIO_STATUS.DISPUTE_UPHELD; v.thread.push({ author: THREAD_AUTHOR.SYSTEM, kind: "decision", name: "Система", text: "Оспаривание удовлетворено — нарушение снято, балл восстановлен.", photos: [], ts: new Date().toISOString() }); }
    else if (decision === "rejected") { v.status = VIO_STATUS.DISPUTE_REJECTED; v.thread.push({ author: THREAD_AUTHOR.SYSTEM, kind: "decision", name: "Система", text: "Оспаривание отклонено — нарушение остаётся в силе.", photos: [], ts: new Date().toISOString() }); }
    // else: pending — waits for more approvers
    await Workflow._save(); App.render();
  }
};

  async _onClick(e) {
    const el = e.target.closest("[data-action], [data-route], [data-pin]");
    if (!el) return;
    
    // Only prevent default for our custom interactive elements to avoid breaking inputs/selects
    if (el.tagName === 'BUTTON' || el.hasAttribute('data-route') || el.hasAttribute('data-action') || el.hasAttribute('data-pin')) {
      if (el.tagName !== 'INPUT' && el.tagName !== 'SELECT' && el.tagName !== 'TEXTAREA') {
        e.preventDefault();
      }
    }
    
    const action = el.dataset.action;
    const route = el.dataset.route;
    const pin = el.dataset.pin;

    if (route) {
      await App.prepareRouteData(route);
      App.route(route);
      return;
    }
    if (pin) { Auth.pinPress(pin); return; }

    switch (action) {
      case "auth-next": Auth.next(); break;
      case "auth-back": Auth.back(); break;
      case "theme-toggle": Theme.toggle(); break;
      case "logout": Session.clear(); location.reload(); break;
      
      // Аудит

      case "toggle-cat": Audit.ui.openCat = Audit.ui.openCat === el.dataset.cat ? null : el.dataset.cat; App.render(); break;

      case "pos-edit": App.adm.posDraft = Object.assign({}, App._positions.find(p => p.id === el.dataset.id)); App.route("position_edit"); break;
      case "pol-list": App.route("policies"); break;

      case "ctr-cat-new": App.ctr.catDraft = { id: "cat_" + Date.now(), deptId: App.ctr.deptId, name: "", weight: 0 }; App.route("category_edit"); break;
      case "ctr-cat-edit": App.ctr.catDraft = Object.assign({}, App.ctr.cats.find(c => c.id === el.dataset.id)); App.route("category_edit"); break;
      case "ctr-cp-new": App.ctr.cpDraft = { id: "chk_" + Date.now(), deptId: App.ctr.deptId, categoryId: el.dataset.cat, index: "", object: "", criterion: "", requirement: "", severityMode: "range" }; App.route("checkpoint_edit"); break;
      case "ctr-cp-edit": App.ctr.cpDraft = Object.assign({}, App.ctr.checks.find(c => c.id === el.dataset.id)); App.route("checkpoint_edit"); break;
      case "cp-mode": App.ctr.cpDraft.severityMode = el.dataset.val; App.render(); break;

      case "ctr-cp-save": DB.saveCheckpoint(App.ctr.cpDraft).then(()=>App.route("constructor")); break;

      case "adm-user-save": DB.saveUser(App.adm.uDraft).then(()=>App.route(App.adm._staffMode ? "staff" : "settings")); break;

      case "pos-save": DB.savePosition(App.adm.posDraft).then(()=>App.route("positions")); break;
      case "pol-save": DB.savePolicy(App.adm.pDraft).then(()=>App.route("policies")); break;

      case "dept-del": if(confirm("Удалить подразделение?")) DB.delDept(el.dataset.id).then(()=>location.reload()); break;
      case "geo-del": if(confirm("Удалить локацию?")) DB.delGeo(el.dataset.id).then(()=>location.reload()); break;
      case "pos-del": if(confirm("Удалить должность?")) DB.delPosition(el.dataset.id).then(()=>location.reload()); break;
      case "adm-user-del": if(confirm("Удалить пользователя?")) DB.delUser(el.dataset.id).then(()=>App.route("settings")); break;
      case "adm-role-del": if(confirm("Удалить роль?")) DB.delRole(el.dataset.id).then(()=>App.route("settings")); break;
      case "ctr-cat-del": if(confirm("Удалить категорию со всеми пунктами?")) {
        const id = el.dataset.id;
        const cps = App.ctr.checks.filter(x => x.categoryId === id);
        Promise.all([DB.delCategory(id), ...cps.map(cp => DB.delCheckpoint(cp.id))]).then(()=>App.prepareRouteData("constructor")).then(()=>App.render());
      } break;
      case "ctr-cp-del": if(confirm("Удалить пункт?")) DB.delCheckpoint(el.dataset.id).then(()=>App.prepareRouteData("constructor")).then(()=>App.render()); break;
    }

  _onChange(e) {
    const el = e.target;
    
    // Обработчики загрузки файлов
    if (el.id === "backupInput" && el.files.length) App.importBackup(el.files[0]);
    if (el.id === "checklistInput" && el.files.length) App.importChecklist(el.files[0]);
    if (el.id === "photoInput" && el.files.length) {
      Promise.all(Array.from(el.files).map(f => Media.compress(f))).then(res => {
        VForm.draft.photos.push(...res); App.render();
      });
      el.value = "";
    }

    const field = el.dataset.field;
    if (!field) return;
    
    switch (field) {
      case "auth-login": Auth.loginVal = el.value; break;
      case "setup-restaurant": App.setup.restaurantId = el.value; break;
      case "penalty": VForm.setPenalty(el.value); break;
      case "assignee": VForm.draft.assigneeRole = el.value; break;
      case "vdeadline": VForm.draft.deadline = el.value; break;
      case "comment": VForm.draft.comment = el.value; break;
      case "hf-from": App.histFilter.from = el.value; App.render(); break;
      case "hf-to": App.histFilter.to = el.value; App.render(); break;
      case "tf-restaurant": App.taskFilter.restaurant = el.value; App.render(); break;
      case "tf-dept": App.taskFilter.dept = el.value; App.render(); break;
      case "tf-assignee": App.taskFilter.assignee = el.value; App.render(); break;
      case "tf-status": App.taskFilter.status = el.value; App.render(); break;
      case "tf-overdue": App.taskFilter.overdue = el.checked; App.render(); break;
    }
  },

  _onInput(e) {
    const el = e.target;
    const field = el.dataset.field;
    if (!field) return;
    if (field === "auth-login") Auth.loginVal = el.value;
    if (field === "search-q") {
      App.searchQuery = el.value;
      const q = el.value.toLowerCase();
      if (q.length >= 2) {
        App._search.audits = (App.histRaw.audits || []).filter(a => (a.restaurant||"").toLowerCase().includes(q) || (a.auditorName||"").toLowerCase().includes(q));
        App._search.violations = (App.taskRaw || []).filter(t => (t.object||"").toLowerCase().includes(q) || (t.v.comment||"").toLowerCase().includes(q));
        App._search.users = (App.users || []).filter(u => (u.name||"").toLowerCase().includes(q) || (u.login||"").toLowerCase().includes(q));
        App._search.places = (App._geo || []).filter(n => (n.name||"").toLowerCase().includes(q));
        App._search.depts = (App._departments || []).filter(d => (d.name||"").toLowerCase().includes(q));
      }
      App.render();
    }
    if (field === "user-search") { App.adm.userQuery = el.value; App.render(); }
    if (field === "cat-name") App.ctr.catDraft.name = el.value;
    if (field === "cat-weight") { App.ctr.catDraft.weight = Number(el.value); App.render(); }
    if (field === "cp-index") App.ctr.cpDraft.index = el.value;
    if (field === "cp-object") App.ctr.cpDraft.object = el.value;
    if (field === "cp-criterion") App.ctr.cpDraft.criterion = el.value;
    if (field === "cp-req") App.ctr.cpDraft.requirement = el.value;
    if (field === "cp-fixed") { App.ctr.cpDraft.fixedPenalty = Number(el.value); App.render(); }
    if (field === "u-name") App.adm.uDraft.name = el.value;
    if (field === "u-login") App.adm.uDraft.login = el.value;
    if (field === "u-pin") App.adm.uDraft.pin = el.value;
    if (field === "pos-title") App.adm.posDraft.title = el.value;
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && Session.data.route === "login" && Auth.step === "login") Auth.next();

  effectivePerms(u) {

  // --- Загрузка данных для экранов ---
  async prepareRouteData(route) {
    if (route === "audit_setup") {
      const audits = await DB.audits();
      App.setup.resumable = audits.filter(a => a.status === AUDIT_STATUS.PAUSED);
      App.setup.restaurants = App._geo.filter(n => n.type === "restaurant");
      App.setup.departments = App._departments.map(d => Object.assign({}, d, { _count: App._catCount[d.id] || 0 }));
      if (!App.setup.selDept && App._departments.length) App.setup.selDept = App._departments[0].id;
    }
    if (route === "dashboard") {
      const audits = await DB.audits();
      const completed = audits.filter(a => a.status === AUDIT_STATUS.COMPLETED);
      App.dash.count = completed.length;
      App.dash.avg = completed.length ? Math.round(completed.reduce((s,a) => s + (a.finalScore||100), 0) / completed.length) : null;
      App.dash.recent = completed.sort((a,b) => new Date(b.startedAt) - new Date(a.startedAt)).slice(0, 5);
    }
    if (route === "history") {
      App.hist.audits = await DB.audits();
      App.hist.total = App.hist.audits.length;
    }
    if (route === "tasks") {
      const vios = await IDB.getAll("audit_violations");
      const audits = await DB.audits();
      const cpMap = {};
      const allCats = await IDB.getAll("checklist_categories");
      const allChks = await IDB.getAll("checklist_structure");
      allChks.forEach(c => cpMap[c.id] = c);
      
      App.taskRaw = vios.filter(v => v.status !== VIO_STATUS.RESOLVED && v.status !== VIO_STATUS.DISPUTE_UPHELD).map(v => {
        const a = audits.find(x => x.id === v.auditId) || {};
        const cp = cpMap[v.checkpointId] || {};
        return { v, a, object: cp.object || "Нарушение", repeat: 1 };
      });
    }
    if (route === "constructor") {
      if (!App.ctr.deptId && App._departments.length) App.ctr.deptId = App._departments[0].id;
      if (App.ctr.deptId) {
        App.ctr.cats = await DB.categories(App.ctr.deptId);
        App.ctr.checks = await DB.checkpoints(App.ctr.deptId);
      }
    }
  },

  staffList() { return App.users.filter(u => u.active && u.id !== App.user.id); },
  filteredTasks() {
    const f = App.taskFilter;
    return App.taskRaw.filter(t => {
      if (f.restaurant && t.a.restaurantId !== f.restaurant) return false;
      if (f.dept && t.v.deptId !== f.dept) return false;
      if (f.assignee && t.v.assigneeRole !== f.assignee) return false;
      if (f.status && t.v.status !== f.status) return false;
      if (f.overdue && !App._isOverdue(t.v)) return false;
      return true;
    });
  },
  taskActiveFilters() {
    const f = App.taskFilter;
    const active = [];
    if (f.restaurant) active.push("ресторан");
    if (f.dept) active.push("отдел");
    if (f.assignee) active.push("роль");
    if (f.status) active.push("статус");
    if (f.overdue) active.push("просрочено");
    return active.join(", ");
  },
  histActiveFilters() { return ""; },
  _isOverdue(vio) { return vio.deadline && new Date(vio.deadline) < new Date(); },
  schedOverdue(rstId) { return null; },

  // --- Бэкапы и Импорт ---
  async exportBackup() {
    if (!App.isAdmin()) return;
    const dump = {};
    for (const store of Object.keys(DB_SCHEMA)) dump[store] = await IDB.getAll(store);
    const blob = new Blob([JSON.stringify(dump)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `tanuki_backup_${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
  },

  async importBackup(file) {
    if (!App.isAdmin() || !confirm("Внимание! Текущая база будет полностью удалена. Продолжить?")) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const dump = JSON.parse(e.target.result);
        App.el.innerHTML = App._splash("Восстановление бэкапа…");
        for (const store of Object.keys(dump)) {
          if (DB_SCHEMA[store] && dump[store]) {
            const os = IDB._db.transaction(store, "readwrite").objectStore(store);
            await new Promise(res => { const req = os.clear(); req.onsuccess = res; req.onerror = res; });
            await IDB.bulkPut(store, dump[store]);
          }
        }
        alert("Бэкап успешно восстановлен!"); location.reload();
      } catch (err) { alert("Ошибка файла бэкапа."); location.reload(); }
    };
    reader.readAsText(file);
  },

  async importChecklist(file) {
    if (!window.XLSX) { alert("Библиотека Excel не загружена (нужен интернет)."); return; }
    if (!App.ctr.deptId) { alert("Выберите подразделение для импорта."); return; }
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const wb = window.XLSX.read(e.target.result, { type: 'binary' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const data = window.XLSX.utils.sheet_to_json(sheet);
        
        let cats = [], checks = [];
        data.forEach((row, i) => {
          let cat = cats.find(c => c.name === row["Категория"]);
          if (!cat) {
            cat = { id: "cat_" + Date.now() + "_" + i, deptId: App.ctr.deptId, name: row["Категория"], weight: Number(row["Вес %"]) || 0 };
            cats.push(cat);
          }
          checks.push({
            id: "chk_" + Date.now() + "_" + i, deptId: App.ctr.deptId, categoryId: cat.id,
            index: row["Индекс"], object: row["Объект"], criterion: row["Критерий"], requirement: row["Требование"],
            severityMode: SEVMODE.RANGE
          });
        });
        
        await IDB.bulkPut("checklist_categories", cats);
        await IDB.bulkPut("checklist_structure", checks);
        alert("Чек-лист успешно импортирован!");
        await App.prepareRouteData("constructor");
        App.render();
      } catch (err) { alert("Неверный формат Excel. Убедитесь, что заголовки колонок совпадают с экспортированным шаблоном."); }
    };
    reader.readAsBinaryString(file);
  },

        ? `<section class="mt-5"><h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Подразделение</h2>
          <div class="space-y-2">${s.departments.map(dep => {
            const has = dep._count > 0, sel = s.selDept === dep.id;
            return `<button ${has ? `data-action="sel-dept" data-dept="${dep.id}"` : "disabled"} class="tnk-press w-full flex items-center gap-3 p-4 rounded-2xl border text-left ${has ? (sel ? "border-brand bg-brand/5" : "border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900") : "opacity-50 border-slate-200 dark:border-slate-800"}">
              <div class="w-9 h-9 grid place-items-center rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500">${UI.icon("store", "w-5 h-5")}</div>
              <div class="flex-1"><div class="font-medium text-sm">${dep.name}</div><div class="text-xs text-slate-500">${has ? dep._count + " категорий" : "нет чек-листа"}</div></div>
              ${sel ? UI.icon("check", "w-5 h-5 text-brand") : ""}</button>`;
          }).join("")}</div></section>`
        : `<p class="mt-5 text-sm text-slate-500 dark:text-slate-400">Будут проверены все подразделения с чек-листом: <b>${s.departments.filter(d => d._count > 0).map(d => d.name).join(", ") || "—"}</b>.</p>`;
      const restBlock = (s.restaurants || []).length ? `<section class="mb-5">
        <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Ресторан</h2>
        <select data-field="setup-restaurant" class="w-full h-12 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm">
          ${s.restaurants.length > 1 ? `<option value="">— выберите ресторан —</option>` : ""}
          ${s.restaurants.map(r => `<option value="${r.id}" ${s.restaurantId === r.id ? "selected" : ""}>${Reports._esc(r.name)}</option>`).join("")}
        </select></section>` : "";
      return App.appBar("Новый аудит", { back: "home" }) + `<main class="max-w-3xl mx-auto px-4 py-6">
        ${resumable}${restBlock}
        <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-3">Охват проверки</h2>
        <div class="flex gap-3">${scopeCard("single", "store", "Одно подразделение", "Бар, кухня, зал…")}${scopeCard("all", "layers", "Все подразделения", "Групповой отчёт")}</div>
        ${deptList}
        <button data-action="start-audit" class="tnk-press mt-6 w-full h-14 rounded-2xl bg-brand text-white font-semibold text-[15px] inline-flex items-center justify-center gap-2">${UI.icon("clipboard", "w-5 h-5")} Начать аудит</button>
      </main>`;
    },

    audit_run() {
      const a = Audit.active; if (!a) return App.screens.home();
      const deptId = Audit.ui.deptId;
      const cats = Audit.data.categories[deptId] || [];
      const chks = Audit.data.checkpoints[deptId] || [];
      const scores = Audit.recompute().scores;
      const tabs = a.deptIds.length > 1 ? `<div class="flex gap-2 overflow-x-auto pb-1 -mx-4 px-4">${a.deptIds.map(id => `
        <button data-action="switch-dept" data-dept="${id}" class="tnk-press shrink-0 px-4 h-9 rounded-full text-sm font-medium border ${id === deptId ? "bg-brand text-white border-brand" : "bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300"}">${App.deptName(id)} ·${Math.round(scores[id] ? scores[id].score : 100)}%</button>`).join("")}</div>` : "";
      const catBlocks = cats.map(cat => {
        const catChks = chks.filter(c => c.categoryId === cat.id);
        const catScore = scores[deptId] && scores[deptId].categories[cat.id] != null ? scores[deptId].categories[cat.id] : 100;
        const open = Audit.ui.openCat === cat.id;
        const rows = open ? catChks.map(cp => {
          const vios = Audit.violationsFor(cp.id);
          return `<div class="p-4 border-t border-slate-100 dark:border-slate-800">
            <div class="flex items-start gap-3">
              <div class="flex-1 min-w-0">
                <div class="text-[13px] text-slate-400">${cp.index} · ${cp.criterion}</div>
                <div class="font-medium text-sm">${cp.object}</div>
                <details class="mt-1"><summary class="text-xs text-brand cursor-pointer select-none">Требование стандарта</summary>
                  <p class="text-xs text-slate-500 dark:text-slate-400 mt-1 leading-relaxed">${cp.requirement || "—"}</p></details>
              </div>
              <button data-action="open-cp" data-dept="${deptId}" data-cp="${cp.id}" class="tnk-press shrink-0 inline-flex items-center gap-1 px-3 h-9 rounded-xl text-xs font-semibold ${vios.length ? "bg-brand text-white" : "bg-brand/10 text-brand"}">${UI.icon("alert", "w-4 h-4")}${vios.length || ""}</button>
            </div></div>`;
        }).join("") : "";
        return `<div class="rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 overflow-hidden">
          <button data-action="toggle-cat" data-cat="${cat.id}" class="w-full flex items-center gap-3 p-4 text-left">
            <div class="flex-1"><div class="font-semibold text-sm">${cat.name}</div><div class="text-xs text-slate-500">${catChks.length} пунктов · вес ${cat.weight}%</div></div>
            <span class="font-semibold text-sm ${App.scoreColor(catScore)}">${Math.round(catScore)}%</span>
            <span class="text-slate-400 transition-transform ${open ? "rotate-180" : ""}">${UI.icon("chevronDown", "w-5 h-5")}</span>
          </button>${rows}</div>`;
      }).join("");
      return App.appBar("Аудит") + `
        <div class="sticky top-14 z-10 bg-[#F7F8FA]/90 dark:bg-[#0B1120]/90 backdrop-blur border-b border-slate-200/70 dark:border-slate-800">
          <div class="max-w-3xl mx-auto px-4 py-3">
            <div class="flex items-end justify-between mb-2">
              <div><div class="text-xs text-slate-500">${a.restaurant ? Reports._esc(a.restaurant) + " · " : ""}${a.scope === "all" ? "Все подразделения" : App.deptName(deptId)}</div>
                <div class="text-3xl font-bold ${App.scoreColor(a.finalScore == null ? 100 : a.finalScore)}">${Math.round(a.finalScore == null ? 100 : a.finalScore)}%</div></div>
              <div class="text-right text-xs text-slate-500">Нарушений<div class="text-lg font-semibold text-slate-700 dark:text-slate-200">${Audit.data.violations.length}</div></div>
            </div>${tabs}
          </div></div>
        <main class="max-w-3xl mx-auto px-4 py-4 space-y-3 pb-28">${catBlocks}</main>
        <footer class="fixed bottom-0 inset-x-0 z-20 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-t border-slate-200 dark:border-slate-800" style="padding-bottom:env(safe-area-inset-bottom)">
          <div class="max-w-3xl mx-auto px-4 py-3 flex gap-2">
            <button data-action="audit-pause" class="tnk-press flex-1 h-12 rounded-xl border border-slate-200 dark:border-slate-700 font-medium text-sm inline-flex items-center justify-center gap-2 text-slate-600 dark:text-slate-300">${UI.icon("pause", "w-4 h-4")}Пауза</button>
            <button data-action="audit-abort" aria-label="Прекратить" class="tnk-press h-12 px-4 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-500 inline-flex items-center justify-center">${UI.icon("stop", "w-4 h-4")}</button>
            <button data-action="audit-finish" class="tnk-press flex-[1.4] h-12 rounded-xl bg-brand text-white font-semibold text-sm inline-flex items-center justify-center gap-2">${UI.icon("check", "w-4 h-4")}Завершить</button>
          </div></footer>`;
    },

    violation() {
      const d = VForm.draft; if (!d || !Audit.active) return App.screens.home();
      const cp = (Audit.data.checkpoints[d.deptId] || []).find(c => c.id === d.checkpointId) || {};
      const existing = Audit.violationsFor(d.checkpointId);
      const penaltyOpts = VForm.penalties.map(p => `<option value="${p.id}" ${p.id === d.penaltyId ? "selected" : ""}>${p.label} (−${p.percent}%)</option>`).join("");
      const roleOpts = `<option value="">— не назначен —</option>` + VForm.orgRoles.map(r => `<option value="${r.id}" ${r.id === d.assigneeRole ? "selected" : ""}>${r.title}</option>`).join("");
      const thumbs = d.photos.map((p, i) => `<div class="relative shrink-0">
        <button data-action="vform-edit-photo" data-idx="${i}" class="block w-20 h-20 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700"><img src="${p}" class="w-full h-full object-cover"></button>
        <button data-action="vform-remove-photo" data-idx="${i}" aria-label="Удалить фото" class="absolute -top-2 -right-2 w-6 h-6 grid place-items-center rounded-full bg-slate-900 text-white shadow">${UI.icon("x", "w-3.5 h-3.5")}</button>
        <span class="absolute bottom-1 right-1 w-5 h-5 grid place-items-center rounded-full bg-brand text-white">${UI.icon("pencil", "w-3 h-3")}</span></div>`).join("");
      const sevBtn = (val, label) => `<button data-action="vform-severity" data-val="${val}" class="tnk-press flex-1 h-11 rounded-xl text-sm font-medium border ${d.severity === val ? (val === SEVERITY.CRITICAL ? "bg-brand text-white border-brand" : "bg-slate-900 text-white border-slate-900 dark:bg-slate-100 dark:text-slate-900 dark:border-slate-100") : "bg-white dark:bg-slate-900 border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300"}">${label}</button>`;
      const existingList = existing.length ? `<section class="mt-6"><h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Уже добавлено (${existing.length})</h3>
        <div class="space-y-2">${existing.map(v => `<div class="flex items-center gap-2 p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
          <span class="w-2 h-2 shrink-0 rounded-full ${v.severity === SEVERITY.CRITICAL ? "bg-brand" : "bg-slate-400"}"></span>
          <div class="flex-1 min-w-0 text-sm truncate">${v.comment || "Без комментария"} <span class="text-xs text-slate-400">−${v.penaltyPercent}%</span></div>
          <span class="text-xs text-slate-400">${App.fmtTime(v.createdAt)}</span>
          <button data-action="del-vio" data-id="${v.id}" aria-label="Удалить" class="text-slate-400">${UI.icon("trash", "w-4 h-4")}</button></div>`).join("")}</div></section>` : "";
      return App.appBar("Нарушение", { back: "audit_run" }) + `<main class="max-w-3xl mx-auto px-4 py-5 pb-28 space-y-5">
        <div class="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
          <div class="text-[13px] text-slate-400">${cp.index || ""} · ${cp.criterion || ""}</div>
          <div class="font-semibold">${cp.object || ""}</div>
          ${cp.requirement ? `<p class="text-xs text-slate-500 dark:text-slate-400 mt-1 leading-relaxed">${cp.requirement}</p>` : ""}
        </div>
        <div><label class="block text-sm font-medium mb-2">Тип нарушения</label><div class="flex gap-2">${sevBtn(SEVERITY.CRITICAL, "Критично")}${sevBtn(SEVERITY.NON_CRITICAL, "Некритично")}</div></div>
        ${d.severityMode === SEVMODE.FIXED
          ? `<div><label class="block text-sm font-medium mb-2">Штраф</label><div class="h-12 px-3 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-sm flex items-center text-slate-600 dark:text-slate-300">−${d.penaltyPercent}\% · фиксированный${d.penaltyPercent >= 100 ? " (обнуляет категорию)" : ""}</div></div>`
          : d.severityMode === SEVMODE.MANAGER
          ? `<div class="p-3 rounded-xl bg-violet-50 dark:bg-violet-500/5 border border-violet-200 dark:border-violet-500/20 text-sm text-slate-600 dark:text-slate-300">${UI.icon("shield", "w-4 h-4 inline mr-1 -mt-0.5")}Оценку в процентах поставит руководитель. Вы фиксируете факт нарушения.</div>`
          : `<div><label class="block text-sm font-medium mb-2" for="pen">Штраф</label>
              <select id="pen" data-field="penalty" class="w-full h-12 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm">${penaltyOpts}</select></div>`}
        <div><label class="block text-sm font-medium mb-2" for="vComment">Комментарий</label>
          <div class="relative"><textarea id="vComment" data-field="comment" rows="3" class="w-full p-3 pr-12 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm resize-none" placeholder="Опишите нарушение…">${d.comment}</textarea>
            <button data-action="vform-voice" aria-label="Голосовой ввод" class="absolute top-2 right-2 w-9 h-9 grid place-items-center rounded-lg ${Voice.active ? "bg-brand text-white animate-pulse" : "bg-slate-100 dark:bg-slate-800 text-slate-500"}">${UI.icon("mic", "w-5 h-5")}</button></div>
          ${Voice.active ? '<div class="text-xs text-brand mt-1">Идёт запись… нажмите микрофон, чтобы остановить</div>' : ""}</div>
        <div><label class="block text-sm font-medium mb-2">Фото</label>
          <div class="flex gap-3 overflow-x-auto pb-1">${thumbs}
            <button data-action="vform-add-photo" aria-label="Добавить фото" class="tnk-press shrink-0 w-20 h-20 rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 grid place-items-center text-slate-400">${UI.icon("camera", "w-6 h-6")}</button></div>
          <input id="photoInput" type="file" accept="image/*" multiple class="hidden"></div>
        <div><label class="block text-sm font-medium mb-2" for="asg">Ответственный (Fix by…)</label>
          <select id="asg" data-field="assignee" class="w-full h-12 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm">${roleOpts}</select></div>
        <div><label class="block text-sm font-medium mb-2" for="vdl">Срок устранения</label>
          <input id="vdl" type="date" data-field="vdeadline" value="${d.deadline || ""}" class="w-full h-12 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm">
          <div class="text-xs text-slate-400 mt-1">Пусто = бессрочно (задача остаётся на контроле).</div></div>
        <div class="text-xs text-slate-400">Время фиксации: ${App.fmtTime(d.createdAt)}</div>
        ${existingList}
      </main>
      <footer class="fixed bottom-0 inset-x-0 z-20 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-t border-slate-200 dark:border-slate-800" style="padding-bottom:env(safe-area-inset-bottom)">
        <div class="max-w-3xl mx-auto px-4 py-3 flex gap-2">
          <button data-action="vform-save-add" class="tnk-press flex-1 h-12 rounded-xl border border-slate-200 dark:border-slate-700 font-medium text-sm text-slate-600 dark:text-slate-300">Сохранить и ещё</button>
          <button data-action="vform-save" class="tnk-press flex-[1.3] h-12 rounded-xl bg-brand text-white font-semibold text-sm">Сохранить</button>
        </div></footer>`;
    },

    photo_edit() {
      App._after = PhotoEdit.init;
      const toolBtn = (val, icon, label) => `<button data-action="pe-tool" data-val="${val}" class="tnk-press flex-1 h-11 rounded-xl text-sm font-medium border inline-flex items-center justify-center gap-1.5 ${PhotoEdit.tool === val ? "bg-brand text-white border-brand" : "bg-slate-800 border-slate-700 text-slate-200"}">${UI.icon(icon, "w-4 h-4")}${label}</button>`;
      return `<div class="min-h-dvh flex flex-col bg-slate-950">
        <header class="flex items-center justify-between px-4 h-14 text-white shrink-0">
          <button data-action="pe-cancel" aria-label="Отмена" class="w-10 h-10 grid place-items-center">${UI.icon("x", "w-6 h-6")}</button>
          <span class="text-sm font-medium">Разметка фото</span>
          <button data-action="pe-save" class="px-4 h-9 rounded-lg bg-brand text-white text-sm font-semibold">Готово</button>
        </header>
        <div class="flex-1 grid place-items-center p-4 overflow-hidden"><canvas id="editCanvas" class="max-w-full rounded-lg touch-none"></canvas></div>
        <div class="p-4 flex gap-2 shrink-0" style="padding-bottom:calc(1rem + env(safe-area-inset-bottom))">
          ${toolBtn("circle", "circle", "Круг")}${toolBtn("arrow", "arrow", "Стрелка")}
          <button data-action="pe-undo" aria-label="Отменить последнее" class="tnk-press h-11 px-4 rounded-xl border border-slate-700 text-slate-300 inline-flex items-center justify-center">${UI.icon("undo", "w-4 h-4")}</button>
        </div></div>`;
    },

    audit_done() {
      const a = Audit.active; if (!a) return App.screens.home();
      const crit = Audit.data.violations.filter(v => v.severity === SEVERITY.CRITICAL).length;
      const perDept = a.deptIds.map(id => { const sc = a.scores[id];
        return `<div class="flex items-center justify-between p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">
          <span class="font-medium text-sm">${App.deptName(id)}</span>
          <span class="font-semibold ${App.scoreColor(sc ? sc.score : 100)}">${Math.round(sc ? sc.score : 100)}%</span></div>`; }).join("");
      const vioRow = (v) => { const m = Workflow.meta(v.status || "open"); const cp = (Audit.data.checkpoints[v.deptId] || []).find(c => c.id === v.checkpointId) || {};
        const struck = v.status === VIO_STATUS.DISPUTE_UPHELD;
        return `<button data-action="wf-open" data-id="${v.id}" class="tnk-press w-full flex items-center gap-3 p-3.5 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-left">
          <span class="w-2 h-2 shrink-0 rounded-full ${v.severity === SEVERITY.CRITICAL ? "bg-brand" : "bg-slate-400"}"></span>
          <div class="flex-1 min-w-0"><div class="text-sm font-medium truncate ${struck ? "line-through text-slate-400" : ""}">${Reports._esc(cp.object || "")}</div>
            <div class="text-xs text-slate-500 truncate">${cp.index || ""} · −${v.penaltyPercent}%${v.comment ? " · " + Reports._esc(v.comment) : ""}</div></div>
          <span class="text-[11px] px-2 py-0.5 rounded-full ${m.cls}">${m.label}</span></button>`; };
      const vioList = Audit.data.violations.length
        ? `<div><h2 class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Нарушения (${Audit.data.violations.length})</h2><div class="space-y-2">${Audit.data.violations.map(vioRow).join("")}</div></div>`
        : "";
      return App.appBar("Аудит завершён", { back: "home" }) + `<main class="max-w-3xl mx-auto px-4 py-8 space-y-6">
        <div class="text-center">
          <div class="w-20 h-20 mx-auto grid place-items-center rounded-full bg-brand/10 text-brand mb-4">${UI.icon("check", "w-10 h-10")}</div>
          <div class="text-sm text-slate-500">Итоговая оценка</div>
          <div class="text-5xl font-bold ${App.scoreColor(a.finalScore == null ? 100 : a.finalScore)}">${Math.round(a.finalScore == null ? 100 : a.finalScore)}%</div>
          <div class="text-sm text-slate-500 mt-2">${a.restaurant ? Reports._esc(a.restaurant) + " · " : ""}${Audit.data.violations.length} нарушений · ${crit} критических</div>
        </div>
        <div class="space-y-2">${perDept}</div>
        ${vioList}
        ${(function () {
          const ack = a.acknowledgment;
          const pickList = (App.staffList ? App.staffList() : App.users.filter(u => u.active && u.id !== App.user.id));
          const users = pickList.length ? pickList : App.users.filter(u => u.active && u.id !== App.user.id);
          const sel = (act) => `<select data-field="ack-user" class="w-full h-11 px-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-sm mb-2"><option value="">— выберите сотрудника —</option>${users.map(u => `<option value="${u.id}" ${App.ackPick === u.id ? "selected" : ""}>${Reports._esc(u.name)}${u.position ? " · " + Reports._esc(u.position) : ""}</option>`).join("")}</select>
            <button data-action="${act}" class="tnk-press w-full h-11 rounded-xl bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 font-medium text-sm">${act === "ack-request" ? "Отправить на ознакомление" : "Передать другому"}</button>`;
          const canRequest = a.auditorId === App.user.id || App.can("task.assign");
          let inner = "";
          if (!ack) inner = canRequest ? `<div class="text-xs text-slate-500 mb-2">Отправьте отчёт ответственному лицу для ознакомления.</div>${sel("ack-request")}` : `<div class="text-sm text-slate-500">Ознакомление не запрошено.</div>`;
          else if (ack.status === "done") inner = `<div class="text-sm text-emerald-600 dark:text-emerald-400 inline-flex items-center gap-1.5">${UI.icon("check", "w-4 h-4")}Ознакомлен: ${Reports._esc(ack.confirmedByName)} ·${App.fmtDate(ack.confirmedTs)}</div>`;
          else if (ack.assignedToId === App.user.id) inner = `<div class="text-sm mb-2">Отчёт направлен вам на ознакомление.</div>
            <button data-action="ack-confirm" class="tnk-press w-full h-11 rounded-xl bg-emerald-600 text-white font-semibold text-sm mb-3">Подтвердить ознакомление</button>
            <div class="text-xs text-slate-500 mb-1">Или передать подчинённому:</div>${sel("ack-delegate")}`;
          else inner = `<div class="text-sm text-amber-600 dark:text-amber-400">Ожидает ознакомления: ${Reports._esc(ack.assignedToName || "")}</div>`;
          return `<div><div class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Ознакомление</div>
            <div class="p-4 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800">${inner}</div></div>`;
        })()}
        <div>
          <div class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Экспорт отчёта</div>
          <div class="grid grid-cols-4 gap-2">
